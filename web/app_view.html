<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PowerPanel AppView</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #000000;
            --bg-color: #121212;
            --bg-badge: rgba(255,255,255,0.3);
            --panel-bg: #202020;
            --primary: #4CAF50;
            --second: #418a44;
            --text: #FFFFFF;
            --title: #AAAAAA;
            --border: #333333;
            --border-neg: #D8D8D8;
        }
        
        /* 🌓 浅色主题（点击按钮时激活） */
        :root.light-theme {
            color-scheme: light;
            --bg: #fafafa;
            --bg-color: #F1F1F1;
            --bg-badge: rgba(128,128,128,0.4);
            --panel-bg: #FFFFFF;
            --primary: #4CAF50;
            --second: #5acc5e;
            --text: #000000;
            --title: #555555;
            --border: #D8D8D8;
            --border-neg: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            overscroll-behavior-y: none; 
            overscroll-behavior: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column;  height: 100dvh; overflow: hidden; 
            /* 👈【核心新增】：全局禁用文本框选与长按手势（彻底解决长按击穿Bug） */
            -webkit-user-select: none; /* iOS Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+ */
            user-select: none;         /* Standard */
            -webkit-touch-callout: none; /* 彻底杜绝全局无关元素的触控反馈 */
        }
        
        /* 👈【核心新增】：仅限需要输入文字的“真实控件”和“灯箱大图”予以白名单放行，恢复原生菜单 */
        input, select, textarea, #lightbox-img {
            -webkit-user-select: auto !important;
            user-select: auto !important;
            -webkit-touch-callout: default !important; /* 👈 允许 iOS 弹出原生打字菜单与大图保存菜单 */
        }

        /* 👈 极致优化：屏蔽手机端双击缩放行为并消除点击延时 */
        body, button, input, select, textarea, .segmented-toggle, .gallery-item {
            touch-action: manipulation;
        }

        /* 实时进度条容器 */
        .progress-bar-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background-color: transparent; z-index: 99999; pointer-events: none;
        }
        .progress-bar-fill {
            width: 0%; height: 100%; background-color: var(--primary);
            transition: width 0.1s ease-out; box-shadow: 0 0 8px var(--primary);
        }

        /* 左侧/顶部：纯大图展示区 */
        .viewer-container {
            display: flex; flex-direction: column;
            flex: 0 0 30dvh; /* 手机端初始占用 30% 高度 */
            background-color: #000; overflow: hidden;
        }

        .preview-section {
            flex: 1; background-color: var(--bg); display: flex; justify-content: center;
            align-items: center; position: relative; overflow: hidden;
        }
        
        #main-preview { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; 
            pointer-events: none; user-select: none; -webkit-user-drag: none; 
        }

        /* 画廊默认样式（手机竖屏：缩略图 50px） */
        .gallery-container { 
            display: flex; overflow-x: auto; padding: 10px 16px; gap: 8px; height: 72px;
            background-color: var(--panel-bg); border-top: 1px solid var(--border);
            border-top-left-radius: 18px; border-top-right-radius: 18px;
            overflow-y: hidden; touch-action: pan-x;
        }
        .gallery-container::-webkit-scrollbar { display: none; }
        .gallery-item {
            width: 60px; height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0;
            border: 2px solid var(--border); cursor: pointer; user-select: none; -webkit-user-drag: none;
        }

        .status-badge {
            position: absolute; top: 10px; right: 10px; background: var(--border); height: 24px;
            padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; color: var(--title); z-index: 10;
            border: 1px solid var(--title); text-shadow: 0px 1px 0px var(--panel-bg);
        }

        /* 拖拽调节器 */
        .resizer {
            height: 18px; width: 100%; cursor: row-resize; flex-shrink: 0;
            position: relative; z-index: 100; user-select: none; background-color: var(--bg-color);
        }
        .resizer::after {
            content: ''; position: absolute; left: 50%; top: 8px; transform: translate(-50%, -50%);
            width: 100px; height: 4px; background: var(--title); border-radius: 2px;
        }

        /* 右侧面板 */
        .right-panel {
            flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; border-top: 2px solid var(--border);
            box-shadow: 0px 0px 30px rgb(0,0,0,0.1); border-top-left-radius: 18px; border-top-right-radius: 18px;
        }

        /* 紧凑参数区：由于画廊手机端在最下侧，Padding只需要 150px（按钮+画廊） */
        .controls-section {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 12px 16px; padding-bottom: 150px; background-color: var(--bg-color);
        }
        .controls-section::-webkit-scrollbar { display: none; }
        .control-group { margin-bottom: 8px;}
        .control-group label.control-title { 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 3px; font-size: 13px; color: var(--title); 
        }
        
        /* 👇 新增：Slider 数值专用小气泡样式，采用等宽字体防止数字跳动时框体抖动 */
        .slider-value-badge {
            background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border); padding: 1px 6px;
            border-radius: 4px; font-size: 11px; font-weight: bold; font-family: monospace;
            color: var(--primary); user-select: none;
        }
        
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--panel-bg); color: var(--text); font-size: 14px; appearance: none;
        }

        /* 👈 核心修改：紧凑型文本域（用来代替input[type="text"]以原生支持多行换行） */
        textarea.tight-textarea {
            width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--panel-bg); color: var(--text); font-size: 14px; height: 36px;
            resize: none; white-space: pre-wrap; line-height: 18px; overflow-y: hidden;
        }
        textarea.tight-textarea:focus { outline: none; border-color: var(--primary); }

        /* 1. 基础容器 (Chrome/Safari/Firefox 均生效) */
        input[type="range"] {
            -webkit-appearance: none;
            -moz-appearance: none; /* 强制 Firefox 允许重写 */
            appearance: none;
            width: 100%;
            height: 36px; /* 轨道厚度，胶囊样式 */
            background: var(--panel-bg); /* 未选中区域底色（跟随你的面板背景） */
            border: 1px solid var(--border); /* 加上边框，和你的文本框风格统一 */
            border-radius: 18px;
            outline: none;
            overflow: hidden; /* 【核心黑科技】：用于裁切滑块产生的巨大阴影，伪装成进度条 */
            margin: 4px 0;
            touch-action: none; 
        }
        
        /* 2. WebKit (Chrome / Edge / Safari / 安卓 / iOS) 的滑块 */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 34px; /* 滑块与内部轨道同高 (36px - 2px边框) */
            height: 34px;
            background: var(--primary); 
            border-radius: 50%;
            cursor: pointer;
            /* 利用向左偏移的巨大阴影，强行画出左侧的绿色进度条 */
            box-shadow: -1016px 0 0 1000px var(--second); 
        }
        
        /* 3. 针对 Firefox 的滑块 (核心修复：使用一模一样的阴影黑科技) */
        input[type="range"]::-moz-range-thumb {
            width: 34px;
            height: 34px;
            background: var(--primary); 
            border: none; /* Firefox 默认带有丑陋的灰色边框，必须清除 */
            border-radius: 50%;
            cursor: pointer;
            /* 一模一样的偏移量，保证和 WebKit 100% 视觉同步 */
            box-shadow: -1016px 0 0 1000px var(--second); 
        }
        
        /* 4. 清除 Firefox 的默认轨道，防止套娃导致错位 */
        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 36px;
            background: transparent;
            border: none; /* 去除多余边框 */
        }
        
        /* 5. 彻底停用 Firefox 的独立进度条，因为我们已经有阴影了 */
        input[type="range"]::-moz-range-progress {
            background: transparent;
            border: none;
        }

        /* 数字加减微调器 */
        .numeric-input-wrapper { display: flex; align-items: center; width: 100%; gap: 6px; }
        .numeric-input-wrapper input { flex: 1; text-align: center; }
        .btn-numeric-adjust {
            background: var(--panel-bg); border: 1px solid var(--border); color: var(--title); border-radius: 8px;
            width: 3rem; height: 36px; cursor: pointer; font-size: 18px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .btn-numeric-adjust:active { background: var(--border); }

        /* 双段开关式 BOOLEAN */
        .segmented-toggle {
            width: 100%; height: 36px; background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 8px; position: relative; cursor: pointer; overflow: hidden;
        }
        .toggle-track { display: flex; height: 100%; position: relative; z-index: 1; }
        .toggle-label-half {
            flex: 1; display: flex; align-items: center; justify-content: center; user-select: none;
            font-size: 13px; font-weight: bold; color: var(--text); transition: color 0.2s; z-index: 2; 
        }
        .toggle-thumb {
            position: absolute; top: 2px; left: 2px; height: calc(100% - 4px);
            width: calc(50% - 4px); background: var(--border); border-radius: 6px;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s; z-index: 1;
        }
        input[type="checkbox"]:checked + .toggle-track .toggle-thumb {
            transform: translateX(calc(100% + 4px)); background: var(--primary);
        }
        input[type="checkbox"]:checked + .toggle-track .toggle-label-half[data-val="true"] { color: #fff; }
        input[type="checkbox"]:not(:checked) + .toggle-track .toggle-label-half[data-val="false"] { color: #fff; }

        /* 多行编辑包装器 */
        .input-with-button { display: flex; gap: 6px; width: 100%; }
        .btn-edit-multiline {
            background: var(--panel-bg); border: 1px solid var(--border); color: #fff; border-radius: 8px; width: 3rem;
            flex-shrink: 0; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
        }
        .btn-edit-multiline:active { background: var(--border); }
        
        /* 👇 新增：让多行编辑容器内的输入框自适应剩余空间，不再霸道地占用 100% 宽度 */
        .input-with-button input, .input-with-button textarea { flex: 1; width: auto; }
        .btn-edit-multiline:active { background: var(--border); }
        
        /* 👇 新增控制行容器，让上传框和切换预览按钮横向并排 */
        .uploader-control-row { display: flex; gap: 6px; width: 100%; }
        .uploader-dropzone {
            flex: 1; padding: 10px; border: 2px dashed var(--border); border-radius: 8px;
            background: var(--bg); text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; user-select: none;
        }
        .uploader-dropzone.dragover { border-color: var(--primary); background: rgba(76, 175, 80, 0.05); }
        /* 👈 已移除原有的 .uploader-icon 图标样式 */
        .uploader-text { font-size: 13px; color: #888; }
        .uploader-filename { font-size: 12px; color: var(--primary); word-break: break-all; margin-top: 2px; font-weight: bold; }
        
        /* 👇 切换预览按钮：移至上传框右侧，外观尺寸与 📝 保持统一 */
        .uploader-preview-toggle {
            background: var(--panel-bg); border: 1px solid var(--border); color: #fff; border-radius: 8px;
            width: 3rem; cursor: pointer; font-size: 16px; display: none; align-items: center;
            justify-content: center; user-select: none;
        }
        .uploader-preview-toggle:active { background: #2a2a2a; }
        .uploader-preview-box {
            margin-top: 6px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel-bg);
            overflow: hidden; display: flex; justify-content: center; align-items: center; max-height: 200px;
            transition: max-height 0.2s ease-out;
        }
        .uploader-preview-box.collapsed { max-height: 0; margin-top: 0; border: none; }
        .uploader-preview-box img, .uploader-preview-box video { max-width: 100%; max-height: 200px; object-fit: contain; }
        .uploader-preview-box audio { width: 100%; padding: 8px; }

        /* 底部操作栏 */
        .bottom-action-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; background-color: var(--panel-bg); z-index: 100; display: flex;
            flex-direction: column; padding-bottom: env(safe-area-inset-bottom); border-top-left-radius: 19px; border-top-right-radius: 19px;
            box-shadow: 0px 0px 30px rgb(0,0,0,0.1); border-top: 1px solid var(--border); 
        }
        
        .button-group { display: flex; gap: 10px; padding: 8px 16px 10px 16px; }
        /* 底部操作按钮基础样式与点击回弹 */
        .btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; height: 40px;
            font-weight: bold; color: white; cursor: pointer; display: flex; justify-content: center;
            align-items: center; transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        
        /* 👇 修改：开始生成按钮。采用蓝色（#3E8AE2），增加鼠标经过高光 */
        .btn-run-wrapper { position: relative; flex: 3; display: flex; }
        .btn-run { width: 100%; background-color: #3E8AE2; }
        .btn-run:hover { filter: brightness(1.15); }
        .queue-badge {
            display: none; position: absolute; top: -6px; left: -6px; font-size: 13px; font-weight: bold;
            background-color: #F44336 !important; color: #FFFFFF !important; height: 26px; min-width: 26px;
            padding: 0 5px; border-radius: 13px; border: 1.5px solid var(--panel-bg); align-items: center; 
            justify-content: center; z-index: 10; pointer-events: none; 
        }
        
        /* 👇 修改：停止按钮。采用深红色（#A6433F），宽度为 60px 的紧凑正方形，增加鼠标经过高光 */
        .btn-stop { background-color: #d13d22; flex: 1; font-size: 20px !important; }
        .btn-stop:hover { filter: brightness(1.15); }
        
        /* 👇【新增：SEED 专属控件整体包装器与下拉动作菜单样式】 */
        .seed-wrapper { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .seed-action-row {
            display: flex; justify-content: space-between;
            align-items: center; gap: 8px; width: 100%; margin-top: 4px;
        }
        .seed-action-label { font-size: 13px; color: var(--title); white-space: nowrap;  user-select: none; }
        .seed-action-select { flex: 1; min-height: 36px; cursor: pointer; outline: none; text-align: right; text-align-last: right; }
        .seed-action-select:focus { border-color: var(--primary); }

        /* 模态浮层基类 */
        .modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; padding: 16px;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px;
            width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: bold; }
        .modal-close { color: #aaa; font-size: 24px; font-weight: bold; cursor: pointer; }
        .modal-close:hover { color: var(--text); }
        #multiline-textarea {
            width: 100%; height: 50vh; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); padding: 10px; font-family: inherit; font-size: 14px; resize: vertical;
        }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn { padding: 8px 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .modal-btn-cancel { background-color: var(--border); color: var(--text); }
        .modal-btn-save { background-color: var(--primary); color: #fff; }

        .lightbox-modal {
            display: none; position: fixed; z-index: 11000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .lightbox-content { max-width: 95dvw; max-height: 90dvh; object-fit: contain; animation: zoom 0.15s ease-out; }
        @keyframes zoom { from {transform: scale(0.95); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        .lightbox-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.55);
            border: none; color: #fff; font-size: 30px; width: 48px; height: 48px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 11200; transition: background 0.2s, transform 0.1s;
        }
        .lightbox-arrow:hover { background: var(--primary); }
        .lightbox-arrow:active { transform: translateY(-50%) scale(0.9); }
        .lightbox-arrow-left { left: 20px; padding-right: 3px; }
        .lightbox-arrow-right { right: 20px; padding-left: 3px; }
        
        .lightbox-close {
            top: 40px; right: 20px; font-size: 35px; font-weight: bold; padding-bottom: 6px;
            user-select: none; z-index: 11300 !important;
        }
        .lightbox-close:hover { background: #d13d22 !important; }
        
        .number-input::-webkit-outer-spin-button, .number-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .number-input[type=number] { -moz-appearance: textfield; }
        .btn-batch-input {
            background-color: var(--border) !important; border: 1px solid #555 !important; border-radius: 8px;
            flex: 0.5; color: #fff;  text-align: center; outline: none; touch-action: manipulation;
        }
        
        .theme-toggle-btn {
            position: absolute; top: 10px; left: 10px; padding: 3px 10px; right: auto; cursor: pointer;
            text-shadow: 0px 0px 1px var(--text) !important; transition: transform 0.2s ease;
        }
        .theme-toggle-btn:hover { transform: scale(1.1); }
        
        .terminal-badge { top: 10px; left: 50px; padding-bottom: 4px; text-shadow: 0px -1px 0px !important;}
        @supports (-webkit-hyphens: none) {
            .terminal-badge { left: 55px; padding-bottom: 10px; }
        }
        
        /* 👇【修改】：将终端展示区域完美适配到弹窗容器中，字体保持高对比度等宽 */
        .log-drawer-body {
            width: 100%; height: 100%; background: #171717; border: 1px solid var(--border); border-radius: 8px; padding: 12px;
            font-family: Consolas, Monaco, "Courier New", monospace; font-size: 12px; color: #ccc; overflow-y: auto;
            -webkit-overflow-scrolling: touch; user-select: text !important; -webkit-user-select: text !important; 
        }
        
        /* 终端高亮配置不变 */
        .log-line { margin-bottom: 3px; word-break: break-all; }
        .log-time { color: #555; margin-right: 6px; }
        .log-tag { font-weight: bold; margin-right: 6px; }
        .log-line.system { color: #ffeb3b; }
        .log-line.system .log-tag { color: #ffeb3b; }
        .log-line.executing { color: #fff; }
        .log-line.executing .log-tag { color: #fff }
        .log-line.running { color: #3E8AE2; }
        .log-line.running .log-tag { color: #3E8AE2; }
        .log-line.output { color: var(--primary); }
        .log-line.output .log-tag { color: var(--primary); }
        .log-line.error { color: var(--danger); }
        .log-line.error .log-tag { color: var(--danger); }

        .btn-console { 
            background-color: #444; color: #fff; flex: 0 0 45px; font-size: 16px !important;
            font-family: monospace; padding-top: 0px; padding-left: 0px;
        }
        .btn-console:hover { filter: brightness(1.2); }
        .btn-console.active { background-color: var(--primary); }
        
        /* 👇【新增】：主布局容器，继承原先 body 的响应式行为 */
        .main-layout { display: flex; flex-direction: column; flex: 1; width: 100%; overflow: hidden; }
        
        /* 👇【新增】：底部日志推起抽屉容器 */
        .log-drawer-container {
            display: flex; flex-direction: column; width: 100%; flex-shrink: 0; height: 0px; /* 默认隐藏 */
            transition: height 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); background-color: var(--panel-bg);
            z-index: 1000; overflow: hidden;
        }
        .log-drawer-container.dragging { transition: none; /* 拖拽时取消动画保证跟手 */ }
        
        .log-resizer {
            height: 18px; width: 100%; cursor: row-resize; background-color: #171717;
            flex-shrink: 0; display: flex; justify-content: center; align-items: center; border-top: 2px solid var(--border);
        }
        .log-resizer::after { content: ''; width: 100px; height: 4px; background: #AAAAAA; border-radius: 2px; }
        
        /* 原有的 log-drawer-body 修改：去掉圆角和边框适应抽屉 */
        .log-drawer-body { flex: 1; border: none; border-radius: 0; height: auto; }
        
        /* 电脑端响应式重写 */
        @media (min-width: 768px) {
            /* 👈 核心修改：body 永远保持垂直排布，把横向排布交给 main-layout */
            .main-layout { flex-direction: row; }
            
            /* 100vh 改为 100%，以完美适应底部抽屉推起后的高度 */
            .viewer-container { flex: 1 1 auto; min-width: 0; height: 100%; }
            .right-panel { 
                flex: 0 0 400px; width: 400px; min-width: 300px; display: flex; flex-direction: column; height: 100%;
                position: relative; box-shadow: none; border-radius: 0px !important; border-top: 0px !important;
            }
            
            /* 横屏PC端画廊高度 */
            .gallery-container { flex: 0 0 100px !important; height: 120px !important; }
            .gallery-item { width: 80px !important; height: 80px !important; }
            
            /* 之前修复的参数栏错位代码（保持绝对定位） */
            .resizer {
                position: absolute; left: 0; top: 0; 
                width: 14px; height: 100%; cursor: col-resize; flex-shrink: 0; border-top: none;
                border-bottom: none; border-left: 1px solid var(--border);
            }
            .resizer::after { width: 4px; height: 80px; left: 50%; top: calc(50% - 46px);}
            .resizer:hover, .resizer.dragging { background: var(--border); }
            .log-resizer {border-top: 1px solid var(--border);}
            
            .controls-section { flex: 1; padding-bottom: 80px; padding-left: 18px; }
            .bottom-action-bar { position: absolute; width: 100%; height: 100px; } 
            .button-group { display: flex; gap: 10px; padding: 16px; padding-top: 30px; }
            .bottom-action-bar, .gallery-container, .resizer { border-radius: 0px; box-shadow: none; }
        }
    </style>
</head>
<body>
    <!-- 顶端隐性进度条 -->
    <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    
    <!-- 👇 1. 【新增】：包裹主界面的全局布局容器 -->
    <div class="main-layout">
        <!-- 视图面板：包揽大图预览 -->
        <div class="viewer-container">
            <div class="preview-section">
                <button class="theme-toggle-btn status-badge" id="theme-toggle">🌓</button>
                <!-- 👈 删除了这里的 terminal-badge 按钮 -->
                <span class="status-badge" id="status-text" data-i18n="label_ready">Ready</span>
                <img id="main-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%'><rect width='100%' height='100%' fill='%23555'/><text x='50%' y='50%' fill='%23999' font-size='16' text-anchor='middle' alignment-baseline='middle'>No Media</text></svg>">
            </div>
            <!-- 结果历史画廊 -->
            <div class="gallery-container" id="gallery"></div>

        <div class="right-panel">
