            <div class="controls-section" id="dynamic-form">
                <p style="color:#aaa; text-align:center; margin-top:20px;" data-i18n="loading_ui">Loading UI...</p>
            </div>
            
            <div class="bottom-action-bar">
                <div class="button-group">
                    <input type="number" id="input-batch-count" class="number-input btn-batch-input" value="1" min="1" max="999">
                    <div class="btn-run-wrapper">
                        <span class="queue-badge" id="queue-badge"></span>
                        <button class="btn btn-run" id="btn-run" data-i18n="button_run">▷ Run</button>
                    </div>
                    <button class="btn btn-stop" id="btn-stop">&times;</button>
                    <!-- 👇 2. 【新增】：将日志切换按钮移到了这里，和停止按钮并排 -->
                    <button class="btn btn-console" id="console-toggle">>_</button>
                </div>
            </div>
        </div>
    </div> <!-- .main-layout 结束 -->
    
    <!-- 👇 3. 【新增】：底部的可伸缩日志抽屉 -->
    <div id="log-drawer-container" class="log-drawer-container">
        <!-- 横向高度调节拖拽条 -->
        <div id="log-resizer" class="log-resizer"></div>
        <div class="log-drawer-body" id="log-content">
            <div class="log-line system"></div>
        </div>
    </div>

    <!-- 文本编辑浮层 -->
    <div id="multiline-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-title" data-i18n="label_editer">Edit Text</span>
                <span class="modal-close" id="multiline-modal-close">&times;</span>
            </div>
            <textarea id="multiline-textarea"></textarea>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="multiline-btn-cancel" data-i18n="label_cancel">Cancel</button>
                <button class="modal-btn modal-btn-save" id="multiline-btn-save" data-i18n="label_save">Save</button>
            </div>
        </div>
    </div>

    <!-- 灯箱模式弹层 -->
    <div id="lightbox-modal" class="lightbox-modal">
        <span class="lightbox-arrow lightbox-close" id="lightbox-close">&times;</span>
        <button class="lightbox-arrow lightbox-arrow-left" id="lightbox-prev">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img">
        <button class="lightbox-arrow lightbox-arrow-right" id="lightbox-next">&#10095;</button>
    </div>

    <script>
        let translations = {};
        let sourceNodeId = null;
        let activeInputEl = null;
        
        // 灯箱数据
        let currentLightboxIndex = 0;
        let currentImagesList = [];
        
        const savedTheme = localStorage.getItem('appview_theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-theme');
        } else {
            document.documentElement.classList.remove('light-theme');
        }
        
        function isSafari() {
            const ua = navigator.userAgent;
            return /Safari/.test(ua) &&
            !/Chrome|CriOS|Edg|OPR|Firefox|FxiOS/.test(ua);
        }
        
        function t(key, defaultText, ...args) {
            let text = translations[key] || defaultText;
            if (args.length > 0) {
                args.forEach((arg, idx) => {
                    text = text.replace(`{${idx}}`, arg);
                });
            }
            return text;
        }
        
        async function loadI18n() {
            let locale = navigator.language.split(/[-_]/)[0];;
            try {
                if (window.opener && window.opener.comfyApp && window.opener.comfyApp.ui) {
                    locale = window.opener.comfyApp.ui.settings.getSettingValue("Comfy.Locale") || "en";
                }
            } catch (e) { console.warn(e); }
            
            if (locale.startsWith("en")) return; 
            
            try {
                const cacheBuster = `?t=${new Date().getTime()}`;
                const i18nUrl = new URL(`i18n/${locale}.json${cacheBuster}`, window.location.href).href;
                let res = await fetch(i18nUrl);
                if (!res.ok) {
                    const baseLang = locale.split('-')[0];
                    const baseI18nUrl = new URL(`i18n/${baseLang}.json`, window.location.href).href;
                    res = await fetch(baseI18nUrl);
                }
                if (res.ok) {
                    translations = await res.json();
                    applyStaticI18n(); 
                }
            } catch (e) {
                console.warn("Translation load skipped or failed:", e);
            }
        }
        
        function applyStaticI18n() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) el.innerText = translations[key];
            });
        }
        
        function updateQueueBadge(count) {
            const badge = document.getElementById('queue-badge');
            if (!badge) return;

            const num = parseInt(count) || 0;
            if (num > 0) {
                badge.innerText = num;
                badge.style.display = 'flex'; // 👈 唤醒显示，填入数字并撑开内心
            } else {
                badge.style.display = 'none'; // 归零隐藏
            }
        }
        
        // 👇【终极升级】：引入增量自增 ID 追踪机制。刷新时自动拉回完整 400 行历史；正常运行时仅增量拉取新行，互不干扰
        let logPollInterval = null;
        window._lastLogId = 0; // 👈 核心：全局追踪本地当前接收到的最大日志 ID 标示
        
        function startLogPolling() {
            if (logPollInterval) return;
            
            logPollInterval = setInterval(async () => {
                try {
                    // 1. 发起增量拉取请求（传递本地最大 ID）
                    const res = await fetch(`/power_panel/logs?after=${window._lastLogId}`);
                    if (res.ok) {
                        const logs = await res.json();
                        if (Array.isArray(logs) && logs.length > 0) {
                            logs.forEach(item => {
                                addRawTerminalLog(item.text); // 将清洗后的文本渲染
                            });
                            // 2. 核心：更新本地最大已接收日志 ID
                            window._lastLogId = logs[logs.length - 1].id;
                        }
                    }
                } catch (err) {
                    console.warn("Polling logs failed:", err);
                }
            }, 500); 
        }
        
        // 💻 必须在全局作用域声明此变量（放在脚本最上方），用于锁定并原位重写 KSampler 跑步进度
        let lastTerminalLineEl = null; 
        
        // 👇【最新升级】：专门针对模态层设计的真实 Python 终端镜像渲染器（带 tqdm 进度原位合并与 ANSI 降噪）
        function addRawTerminalLog(lineText) {
            const content = document.getElementById('log-content');
            if (!content) return;
            
            const time = new Date().toLocaleTimeString();
            
            // 1. 判定此行是否是 KSampler 等节点的 tqdm 进度条（含有百分比、步数或速度指示）
            const isProgress = lineText.includes('it/s') || lineText.includes('%|') || lineText.includes('s/it');
            
            // 2. 👈【核心清洗】：利用正则表达式彻底过滤掉 Python 终端自带的 \u001b[32m 等彩色 ANSI 转义字符乱码
            const cleanText = lineText.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '').trim();
            
            if (!cleanText) return;
            
            // 3. 👈【原位重写】：如果这一行是进度条，且上一行也是进度条，我们直接在上一行进行覆盖写入，绝不让进度条刷屏！
            if (isProgress && lastTerminalLineEl && lastTerminalLineEl.parentNode === content) {
                lastTerminalLineEl.innerHTML = cleanText;
            } else {
                const lineEl = document.createElement('div');
                
                // 根据控制台日志文本，自适应匹配高亮颜色
                let typeClass = 'system';
                if (cleanText.includes('[ERROR]') || cleanText.includes('[WARNING]') || cleanText.includes('Error') || cleanText.includes('Exception') || cleanText.includes('FAILED')) {
                    typeClass = 'error';
                } else if (cleanText.includes('Prompt executed') || cleanText.includes('executed in') || cleanText.includes('[INFO] Prompt executed')) {
                    typeClass = 'output';
                } else if (cleanText.includes('got prompt') || cleanText.includes('[INFO] got prompt') || isProgress) {
                    typeClass = 'executing';
                }
                
                lineEl.className = `log-line ${typeClass}`;
                lineEl.innerHTML = cleanText;
                content.appendChild(lineEl);
                
                // 标记最后一行是否是进度条，以便下一个 step 覆写
                if (isProgress) {
                    lastTerminalLineEl = lineEl;
                } else {
                    lastTerminalLineEl = null; // 非进度条，重置锁，另起新行
                }
            }
            
            // 4. 强行保持日志滚动条固定在最底端，保障阅读最新内容
            content.scrollTop = content.scrollHeight;
            
            // 5. 限制最大缓存 420 行防止内存泄漏
            while (content.childNodes.length > 420) {
                content.removeChild(content.firstChild);
            }
        }
        
        // 统一消息接收
        window.addEventListener('message', (event) => {
            const msg = event.data;
            if (!msg) return;
            
            const statusText = document.getElementById('status-text');
            if (msg.type === 'b_preview') {
                if (msg.blob) document.getElementById('main-preview').src = URL.createObjectURL(msg.blob);
            }
            else if (msg.type === 'executed') {
                const data = msg.detail;
                if (data && data.output && data.output.images) {
                    data.output.images.forEach(img => {
                        const imgUrl = `/view?filename=${encodeURIComponent(img.filename)}&subfolder=${encodeURIComponent(img.subfolder)}&type=${encodeURIComponent(img.type)}`;
                        document.getElementById('main-preview').src = imgUrl;
                        
                        const imgEl = document.createElement('img');
                        imgEl.src = imgUrl;
                        imgEl.className = 'gallery-item';
                        
                        // 点击小图：大图载入并弹起灯箱大图
                        imgEl.onclick = function() {
                            document.getElementById('main-preview').src = this.src;
                            openLightbox(this.src); 
                        };
                        
                        const gallery = document.getElementById('gallery');
                        gallery.insertBefore(imgEl, gallery.firstChild);
                        
                        // 👇【核心修改】：如果此时灯箱正开着，动态在后台静默重组播放列表，并校正索引，防止画面跳动
                        const lightboxModal = document.getElementById('lightbox-modal');
                        if (lightboxModal && lightboxModal.style.display === 'flex') {
                            const currentViewedUrl = currentImagesList[currentLightboxIndex]; // 记录目前正在看的大图
                            
                            // 重新搜集包含最新生成图片的完整列表
                            const items = Array.from(document.querySelectorAll('.gallery-item'));
                            currentImagesList = items.map(i => i.src);
                            
                            // 反查并更新当前看的大图在新列表里的新位置（防止索引因新图插入发生漂移导致切图错乱）
                            currentLightboxIndex = currentImagesList.indexOf(currentViewedUrl);
                            if (currentLightboxIndex === -1) currentLightboxIndex = 0;
                        }
                    });
                }
            }
            else if (msg.type === 'execution_start') {
                statusText.innerText = t("label_generating", "Generating...");
                statusText.style.color = "var(--primary)";
                document.getElementById('progress-bar').style.width = '0%'; // 重置进度
                document.getElementById('btn-run').style.backgroundColor = 'var(--primary)';
                document.getElementById('btn-run').innerText = t("button_running", "▷ Running...");
                syncParentValuesToAppView();
            }
            else if (msg.type === 'progress') {
                const data = msg.detail;
                if (data && data.max) {
                    const percentage = (data.value / data.max) * 100;
                    document.getElementById('progress-bar').style.width = `${percentage}%`;
                }
            }
            else if (msg.type === 'status') {
                if (msg.detail && msg.detail.exec_info) {
                    const remaining = msg.detail.exec_info.queue_remaining;
                    updateQueueBadge(remaining);
                    if (msg.detail.exec_info.queue_remaining === 0) {
                        setTimeout(() => {
                            statusText.innerText = t("label_ready", "Ready");
                            statusText.style.color = "var(--title)";
                        }, 300);
                        document.getElementById('progress-bar').style.width = '0%'; // 清空进度
                        document.getElementById('btn-run').style.backgroundColor = '#3E8AE2';
                        document.getElementById('btn-run').innerText = t("button_run", "▷ Run");
                        syncParentValuesToAppView();
                    }
                }
            }
            else if (msg.type === 'execution_interrupted') {
                statusText.innerText = t("label_interrupted", "Interrupted");
                statusText.style.color = "#f44336";
                document.getElementById('progress-bar').style.width = '0%'; // 清空进度
                document.getElementById('btn-run').style.backgroundColor = '#3E8AE2';
                document.getElementById('btn-run').innerText = t("button_run", "▷ Run");
                updateQueueBadge(0);
            }
            else if (msg.type === 'execution_error') {
                const data = msg.detail;
                statusText.innerText = "Error";
                statusText.style.color = "#f44336"; // 将状态文字设为红色警告色
                document.getElementById('progress-bar').style.width = '0%'; // 重置进度条
                document.getElementById('btn-run').style.backgroundColor = '#3E8AE2';
                document.getElementById('btn-run').innerText = t("button_run", "▷ Run");
                updateQueueBadge(0);
                if (data) {
                    const errorMsg = data.exception_message || "Unknown error";
                    const nodeType = data.node_type || "Unknown Node";
                    const nodeIdVal = data.node_id || "?";
                    const errType = data.exception_type || "Exception";
                    
                    // 弹出带有故障细节定位的人性化提示框
                    alert(`⚠️ ComfyUI Execution Error\n\nFailed Node: ${nodeType} (ID: ${nodeIdVal})\nError Type: ${errType}\n\nMessage:\n${errorMsg}`);
                }
            }
            else if (msg.type === 'pre_queue_error') {
                statusText.innerText = t("label_error", "Error");
                statusText.style.color = "#f44336";
                document.getElementById('progress-bar').style.width = '0%';
                document.getElementById('btn-run').style.backgroundColor = '#3E8AE2';
                document.getElementById('btn-run').innerText = t("button_run", "▷ Run");
                updateQueueBadge(0);
                alert(`⚠️ ComfyUI Queue Error\n\n${msg.message}`);
            }
            else if (msg.type === 'executing') {
                const nodeId = msg.detail;
                if (nodeId && window.comfyApp) {
                    const node = window.comfyApp.graph.getNodeById(nodeId);
                    if (node) {
                        let nodeName = node.title || node.type || `Node #${nodeId}`;
                        if (nodeName.length > 50) nodeName = nodeName.substring(0, 50) + "..";
                        statusText.innerText = nodeName;
                        statusText.style.color = "var(--primary)";
                    }
                }
            }
        });
        
        // 页面初始化
        window.addEventListener('DOMContentLoaded', async () => {
            await loadI18n();
            
            const urlParams = new URLSearchParams(window.location.search);
            const nodeId = urlParams.get('nodeId');
            
            if (nodeId && window.opener && !window.opener.closed) {
                const parentApp = window.opener.comfyApp;
                const parentApi = window.opener.comfyApi;
                
                window.comfyApp = parentApp;
                window.comfyApi = parentApi;
                
                const parentNode = parentApp.graph.getNodeById(nodeId);
                if (parentNode) {
                    sourceNodeId = nodeId;
                    parentNode.registerAppWindow(window);
                    
                    const jsonStr = parentNode.widgets.find(w => w.name === "config_json")?.value || "{}";
                    renderDynamicForm(JSON.parse(jsonStr));
                    
                    /// 1. 初始化拖拽事件监听
                    initResizeLogic();
                    initLogResizeLogic();
                    
                    // 2. 👈【核心修改】：首次加载时传入 true 触发初始化排版，并在窗口调整大小时传入 false 调度过渡清理
                    handleResponsiveLayout(true); 
                    window.addEventListener('resize', () => handleResponsiveLayout(false));
                    
                    // 3. 初始化灯箱事件
                    // 初始化灯箱事件
                    initLightboxEvents();
                    
                    // 👇【全新替换】：底部控制台抽屉逻辑
                    const logContainer = document.getElementById('log-drawer-container');
                    const logBtn = document.getElementById('console-toggle');
                    let logHeight = localStorage.getItem('appview_log_height') || 250;
                    let isLogOpen = false;
                    
                    logBtn.onclick = (e) => {
                        e.stopPropagation();
                        isLogOpen = !isLogOpen;
                        logBtn.classList.toggle('active', isLogOpen);
                        
                        if (isLogOpen) {
                            logContainer.style.height = `${logHeight}px`;
                            // 展开时立即滚动到底部
                            setTimeout(() => {
                                const content = document.getElementById('log-content');
                                if (content) content.scrollTop = content.scrollHeight;
                            }, 250); // 等待过渡动画结束
                        } else {
                            logContainer.style.height = '0px';
                        }
                    };
                    
                    // 3. 👇【核心修改】：启动后台静默轮询，无需拉下把手，它会在后台默默收集所有生成日志，随点随看！
                    startLogPolling();
                    
                    document.getElementById('theme-toggle').onclick = () => {
                        const isLight = document.documentElement.classList.toggle('light-theme');
                        localStorage.setItem('appview_theme', isLight ? 'light' : 'dark');
                    };
                } else {
                    document.getElementById('dynamic-form').innerHTML = 
                    `<div style="text-align:center; padding: 20px; color:#f44336; line-height: 1.6;">
                            <p style="font-size: 24px; margin-bottom:10px;">⚠️</p>
                            <p style="font-size: 14px; font-weight:bold;">${t('node_lost_alert', 'The original workflow was closed or not activated!')}</p>
                        </div>`;
                }
            } else {
                document.getElementById('dynamic-form').innerHTML = 
                `<div style="text-align:center; padding: 20px; color:#f44336; line-height: 1.6;">
                        <p style="font-size: 24px; margin-bottom:10px;">⚠️</p>
                        <p style="font-size: 14px; font-weight:bold;">${t('connection_lost', 'Connection lost! Please reopen from the original panel.')}</p>
                    </div>`;
            }
        });
        
        let isDesktopState = window.innerWidth >= 768; // 缓存并跟踪当前的视口状态
        
        // 👇【核心修复】：状态机切换，彻底解决横竖屏转换时 inline 残留样式冲突的Bug
        function handleResponsiveLayout(isInit = false) {
            const isDesktop = window.innerWidth >= 768;
            const rightPanel = document.querySelector('.right-panel');
            const viewerContainer = document.querySelector('.viewer-container');
            if (!rightPanel || !viewerContainer) return;
            
            // 1. 画廊动态挪迁
            adjustGalleryLayout();
            
            // 2. 首次启动加载：直接从本地存储恢复对应设备的记忆数值，无需执行样式清理
            if (isInit) {
                if (isDesktop) {
                    const savedWidth = localStorage.getItem('appview_panel_width') || "400";
                    rightPanel.style.width = `${savedWidth}px`;
                    rightPanel.style.flexBasis = `${savedWidth}px`;
                } else {
                    const savedHeight = localStorage.getItem('appview_preview_height') || "30dvh";
                    viewerContainer.style.flex = `0 0 ${savedHeight}px`;
                }
                return;
            }
            
            // 3. 越界状态过渡：清除对方设备的 inline 残留，防止样式高权重锁死布局
            if (isDesktop && !isDesktopState) {
                // 📱 手机 -> 💻 电脑
                viewerContainer.style.flex = ""; // 彻底清除手机端残留的高度
                const savedWidth = localStorage.getItem('appview_panel_width') || "400";
                rightPanel.style.width = `${savedWidth}px`;
                rightPanel.style.flexBasis = `${savedWidth}px`; // 应用电脑端的宽
                
                isDesktopState = true;
            } else if (!isDesktop && isDesktopState) {
                // 💻 电脑 -> 📱 手机
                rightPanel.style.width = ""; // 彻底清除电脑端残留的宽度，允许手机端100%自适应
                rightPanel.style.flexBasis = ""; // 彻底清除 flex-basis
                const savedHeight = localStorage.getItem('appview_preview_height') || "30dvh";
                viewerContainer.style.flex = `0 0 ${savedHeight}px`; // 应用手机端的高
                
                isDesktopState = false;
            }
        }
        
        // 保留原有的 adjustGalleryLayout 不变，仅作为位置搬迁辅助
        function adjustGalleryLayout() {
            const isDesktop = window.innerWidth >= 768;
            const gallery = document.getElementById('gallery');
            if (!gallery) return;
            
            if (isDesktop) {
                const viewerContainer = document.querySelector('.viewer-container');
                if (viewerContainer && gallery.parentNode !== viewerContainer) {
                    viewerContainer.appendChild(gallery);
                }
            } else {
                const actionBar = document.querySelector('.bottom-action-bar');
                const buttonGroup = document.querySelector('.button-group');
                if (actionBar && buttonGroup && gallery.parentNode !== actionBar) {
                    actionBar.insertBefore(gallery, buttonGroup);
                }
            }
        }
        
        // 👇【核心修改】：改造为 SEED 专属定向同步（在生成完毕后，有且仅有种子参数才允许被反向回写，绝对不碰其他参数草稿）
        function syncParentValuesToAppView() {
            if (!window.comfyApp || !sourceNodeId) return;
            const node = window.comfyApp.graph.getNodeById(sourceNodeId);
            if (!node) return;
            
            for (const widget of node.widgets) {
                // 1. 判断当前是否为 SEED（种子）控件
                const isSeedWidget = !!document.getElementById(`input_action_${widget.name}`);
                
                if (isSeedWidget) {
                    const inputEl = document.getElementById(`input_${widget.name}`);
                    if (inputEl) {
                        // 仅同步并更新种子数值
                        inputEl.value = widget.value;
                        inputEl.dispatchEvent(new Event('change'));
                        inputEl.dispatchEvent(new Event('input'));
                    }
                    
                    // 2. 刷新其伴生的 control_after_generate 下拉菜单状态
                    if (widget.name === 'control_after_generate') {
                        const idx = node.widgets.indexOf(widget);
                        if (idx > 0) {
                            const seedWidget = node.widgets[idx - 1];
                            const actionSelect = document.getElementById(`input_action_${seedWidget.name}`);
                            if (actionSelect) {
                                actionSelect.value = widget.value;
                            }
                        }
                    }
                }
            }
        }
        
        // 动态表单生成（支持 UPLOADER 媒体上传与折叠预览）
        async function renderDynamicForm(config) {
            const formContainer = document.getElementById('dynamic-form');
            formContainer.innerHTML = ''; 
            
            for (const [key, params] of Object.entries(config)) {
                const type = (params.type || "STRING").toUpperCase();
                if (type === "BUTTON") continue; 
                
                const group = document.createElement('div');
                group.className = 'control-group';
                
                const label = document.createElement('label');
                label.className = 'control-title';
                label.innerText = params.name || key;
                group.appendChild(label);
                
                // 获取主界面节点实时数值
                const parentNode = window.comfyApp ? window.comfyApp.graph.getNodeById(sourceNodeId) : null;
                const parentWidget = parentNode ? parentNode.widgets.find(w => w.name === key) : null;
                const currentValue = parentWidget ? parentWidget.value : params.default;
                    
                    if (type === "INT" || type === "FLOAT") {
                        const isSlider = params.slider === true || params.display === "slider";
                        
                        // 修改后：自适应读取 precision 精度值并强制补齐小数长度（如 0.5 补齐为 0.500）
                        if (isSlider) {
                            // 1. 提取精度：若 JSON 带有精度值则强制使用；若无，FLOAT 默认保留 3 位，INT/SEED 保留 0 位
                            const precision = params.precision !== undefined ? Number(params.precision) : (type === "FLOAT" ? 3 : 0);
                            
                            // 2. 初始化时通过 toFixed 补齐到指定精度长度
                            const formattedInitial = Number(currentValue ?? 0).toFixed(precision);
                            
                            label.innerHTML = `<span>${params.name || key}</span><span class="slider-value-badge" id="badge_${key}">${formattedInitial}</span>`;
                            
                            const input = document.createElement('input');
                            input.type = 'range';
                            input.value = currentValue ?? 0;
                            if(params.min !== undefined) input.min = params.min;
                            if(params.max !== undefined) input.max = params.max;
                            
                            const step = params.step !== undefined ? Number(params.step) : (type === "INT" ? 1 : 0.1);
                            input.step = step;
                            
                            input.id = `input_${key}`;
                            
                            // 3. 拖拽实时更新时，同样通过 toFixed 补齐长度
                            input.addEventListener('input', () => {
                                const badge = document.getElementById(`badge_${key}`);
                                if (badge) {
                                    badge.innerText = Number(input.value).toFixed(precision);
                                }
                            });
                            
                            group.appendChild(input);
                        } else {
                            const wrapper = document.createElement('div');
                            wrapper.className = 'numeric-input-wrapper';
                            
                            const btnMinus = document.createElement('button');
                            btnMinus.type = 'button';
                            btnMinus.className = 'btn-numeric-adjust';
                            btnMinus.innerText = '◀';
                            
                            const input = document.createElement('input');
                            input.type = 'number';
                            input.className = 'number-input';
                            input.value = currentValue ?? 0;
                            input.id = `input_${key}`;
                            if(params.min !== undefined) input.min = params.min;
                            if(params.max !== undefined) input.max = params.max;
                            
                            const step = params.step !== undefined ? Number(params.step) : (type === "INT" ? 1 : 0.1);
                            input.step = step;
                            
                            const btnPlus = document.createElement('button');
                            btnPlus.type = 'button';
                            btnPlus.className = 'btn-numeric-adjust';
                            btnPlus.innerText = '▶';
                            
                            const minVal = params.min !== undefined ? Number(params.min) : -Infinity;
                            const maxVal = params.max !== undefined ? Number(params.max) : Infinity;
                            
                            btnMinus.onclick = () => {
                                let val = Number(input.value) - step;
                                if (val < minVal) val = minVal;
                                if (type === "FLOAT") val = parseFloat(val.toFixed(4));
                                input.value = val;
                                input.dispatchEvent(new Event('change'));
                            };
                            
                            btnPlus.onclick = () => {
                                let val = Number(input.value) + step;
                                if (val > maxVal) val = maxVal;
                                if (type === "FLOAT") val = parseFloat(val.toFixed(4));
                                input.value = val;
                                input.dispatchEvent(new Event('change'));
                            };
                            
                            wrapper.appendChild(btnMinus);
                            wrapper.appendChild(input);
                            wrapper.appendChild(btnPlus);
                            group.appendChild(wrapper);
                        }
                    } else if (type === "BOOLEAN" || type === "BYPASSER") {
                        const toggleContainer = document.createElement('div');
                        toggleContainer.className = 'segmented-toggle';
                        
                        const input = document.createElement('input');
                        input.type = 'checkbox';
                        input.id = `input_${key}`;
                        input.checked = currentValue ?? true;
                        input.style.display = 'none';
                        
                        const track = document.createElement('div');
                        track.className = 'toggle-track';
                        
                        const labelFalse = document.createElement('div');
                        labelFalse.className = 'toggle-label-half';
                        labelFalse.setAttribute('data-val', 'false');
                        labelFalse.innerText = (type === "BYPASSER") ? t('label_off', 'OFF') : t('label_false', 'False');
                        
                        const labelTrue = document.createElement('div');
                        labelTrue.className = 'toggle-label-half';
                        labelTrue.setAttribute('data-val', 'true');
                        labelTrue.innerText = (type === "BYPASSER") ? t('label_on', 'ON') : t('label_true', 'True');
                        
                        const thumb = document.createElement('div');
                        thumb.className = 'toggle-thumb';
                        
                        track.appendChild(labelFalse);
                        track.appendChild(labelTrue);
                        track.appendChild(thumb);
                        
                        toggleContainer.appendChild(input);
                        toggleContainer.appendChild(track);
                        
                        input.addEventListener('change', () => {
                            if (window.comfyApp && sourceNodeId) {
                                const node = window.comfyApp.graph.getNodeById(sourceNodeId);
                                if (node) {
                                    const widget = node.widgets.find(w => w.name === key);
                                    if (widget) {
                                        widget.value = input.checked;
                                        if (widget.callback) widget.callback(input.checked);
                                    }
                                }
                            }
                        });
                        
                        // 点击切换
                        toggleContainer.addEventListener('click', () => {
                            input.checked = !input.checked;
                            input.dispatchEvent(new Event('change'));
                        });
                        
                        // 左右手势拖拽
                        let startX = 0;
                        toggleContainer.addEventListener('touchstart', (e) => {
                            startX = e.touches[0].clientX;
                        }, {passive: true});
                        toggleContainer.addEventListener('touchend', (e) => {
                            let endX = e.changedTouches[0].clientX;
                            let diffX = endX - startX;
                            if (Math.abs(diffX) > 40) {
                                if (diffX > 0 && !input.checked) {
                                    input.checked = true;
                                    input.dispatchEvent(new Event('change'));
                                } else if (diffX < 0 && input.checked) {
                                    input.checked = false;
                                    input.dispatchEvent(new Event('change'));
                                }
                            }
                        }, {passive: true});
                        
                        group.appendChild(toggleContainer);
                    } else if (type === "COMBO") {
                        const select = document.createElement('select');
                        select.id = `input_${key}`;
                        let values = params.values || ["None"];
                        if (params.folder) {
                            try {
                                const response = await fetch(`/power_panel/ls/${params.folder}`);
                                if (response.ok) {
                                    const data = await response.json();
                                    values = ["None", ...data];
                                }
                            } catch (e) { console.error("Fetch models failed:", e); }
                        }
                        values.forEach(val => {
                            const opt = document.createElement('option');
                            opt.value = val;
                            opt.innerText = val;
                            select.appendChild(opt);
                        });
                        select.value = currentValue ?? params.default;
                            group.appendChild(select);
                    } else if (type === "UPLOADER") {
                        const uploaderContainer = document.createElement('div');
                        uploaderContainer.className = 'uploader-wrapper';
                        
                        // 存储文件名的隐藏 Input，用来与 ComfyUI 进行后台通信同步
                        const valueInput = document.createElement('input');
                        valueInput.type = 'hidden';
                        valueInput.id = `input_${key}`;
                        valueInput.value = currentValue || '';
                        uploaderContainer.appendChild(valueInput);
                        
                        const controlRow = document.createElement('div');
                        controlRow.className = 'uploader-control-row';
                        
                        // 拖拽盒子（移除了 📤 图标标签）
                        const dropzone = document.createElement('div');
                        dropzone.className = 'uploader-dropzone';
                        
                        const text = document.createElement('span');
                        text.className = 'uploader-text';
                        const mediaType = params.media || 'image';
                        text.innerText = t("label_uploader", "Drop {0} here or click to browse",t(mediaType, mediaType));
                        
                        const filenameLabel = document.createElement('div');
                        filenameLabel.className = 'uploader-filename';
                        filenameLabel.innerText = currentValue ? currentValue : '';
                        
                        dropzone.appendChild(text);
                        dropzone.appendChild(filenameLabel);
                        
                        // 原生隐藏的文件选择控件 (放置在 dropzone 外部，杜绝点击事件无限死循环调用)
                        const fileInput = document.createElement('input');
                        fileInput.type = 'file';
                        fileInput.style.display = 'none';
                        if (mediaType === 'image') fileInput.accept = 'image/*';
                        else if (mediaType === 'video') fileInput.accept = 'video/*';
                        else if (mediaType === 'audio') fileInput.accept = 'audio/*';
                        else fileInput.accept = 'image/*,video/*,audio/*';
                        
                        // 预览切换按钮（移至右侧，改用 👁️ 进行简洁显示）
                        const previewToggle = document.createElement('button');
                        previewToggle.type = 'button';
                        previewToggle.className = 'uploader-preview-toggle';
                        previewToggle.innerText = '👁️';
                        previewToggle.style.display = currentValue ? 'flex' : 'none';
                        
                        // 依次将组件塞入行容器中
                        controlRow.appendChild(dropzone);
                        controlRow.appendChild(previewToggle);
                        
                        uploaderContainer.appendChild(fileInput);
                        uploaderContainer.appendChild(controlRow);
                        
                        // 预览盒子
                        const previewBox = document.createElement('div');
                        previewBox.className = 'uploader-preview-box collapsed';
                        
                        uploaderContainer.appendChild(previewBox);
                        
                        // 触发文件选择
                        dropzone.onclick = () => {
                            fileInput.click();
                        };
                        
                        // 处理拖放与选择事件
                        dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
                        dropzone.ondragenter = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
                        dropzone.ondragleave = () => { dropzone.classList.remove('dragover'); };
                        dropzone.ondrop = (e) => {
                            e.preventDefault();
                            dropzone.classList.remove('dragover');
                            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                                handleFileUpload(e.dataTransfer.files[0]);
                            }
                        };
                        
                        fileInput.onchange = () => {
                            if (fileInput.files && fileInput.files.length > 0) {
                                handleFileUpload(fileInput.files[0]);
                            }
                        };
                        
                        // 监听文件值的变动，一旦发生改变（上传成功或重新加载），实时更新主节点
                        valueInput.addEventListener('change', () => {
                            if (window.comfyApp && sourceNodeId) {
                                const node = window.comfyApp.graph.getNodeById(sourceNodeId);
                                if (node) {
                                    const widget = node.widgets.find(w => w.name === key);
                                    if (widget) {
                                        widget.value = valueInput.value;
                                        if (widget.callback) widget.callback(valueInput.value);
                                    }
                                }
                            }
                        });
                        
                        // 异步上传逻辑
                        // 异步上传逻辑（已升级客户端格式过滤防护网）
                        async function handleFileUpload(file) {
                            // 👇【核心修改：客户端多媒体类型强制双重验证（MIME + 后缀名）】
                            const mime = file.type || "";
                            const ext = file.name.split('.').pop().toLowerCase();
                            
                            // 👇【严格按照 ComfyUI 官方及主流媒体节点支持的格式构建的白名单】
                            const imageExts = ['png', 'jpg', 'jpeg', 'webp', 'bmp', 'tif', 'tiff', 'jfif', 'jpe', 'tga'];
                            const videoExts = ['mp4', 'webm', 'mkv', 'mov', 'avi', 'gif', 'flv', '3gp'];
                            const audioExts = ['wav', 'mp3', 'ogg', 'flac', 'm4a', 'aac', 'wma'];
                            
                            // 双重校验：支持 mime 类型检测和物理后缀白名单检测
                            const isImage = mime.startsWith('image/') || imageExts.includes(ext);
                            const isVideo = mime.startsWith('video/') || videoExts.includes(ext);
                            const isAudio = mime.startsWith('audio/') || audioExts.includes(ext);
                            
                            // 匹配当前控件要求的 mediaType
                            let isValid = false;
                            if (mediaType === 'image') {
                                isValid = isImage;
                            } else if (mediaType === 'video') {
                                isValid = isVideo;
                            } else if (mediaType === 'audio') {
                                isValid = isAudio;
                            } else {
                                // 若没配置或设为 all，默认支持上述三大类多媒体
                                isValid = isImage || isVideo || isAudio;
                            }
                            
                            // 拦截验证失败的文件
                            if (!isValid) {
                                //alert(`Upload Blocked!\nThis uploader is configured for [${mediaType.toUpperCase()}] files only.\n\nSelected file: ${file.name}`);
                                text.innerText = t("label_uploader", "Drop {0} here or click to browse",t(mediaType, mediaType));
                                return;
                            }
                            
                            // 通过验证后开始执行上传动作
                            text.innerText = t('label_uploading', 'Uploading...');
                            const formData = new FormData();
                            formData.append('image', file);
                            
                            try {
                                const response = await fetch('/upload/image', {
                                    method: 'POST',
                                    body: formData
                                });
                                if (response.ok) {
                                    const result = await response.json();
                                    valueInput.value = result.name;
                                    filenameLabel.innerText = result.name;
                                    text.innerText = t("label_uploader", "Drop {0} here or click to browse",t(mediaType, mediaType));
                                    
                                    valueInput.dispatchEvent(new Event('change'));
                                    
                                    updateMediaPreview(result.name);
                                } else {
                                    text.innerText = t('label_upfailed', 'Upload failed!');
                                }
                            } catch (err) {
                                console.error(err);
                                text.innerText = t('label_upfailed', 'Upload failed!');
                            }
                        }
                        
                        // 自适应媒体类型预览组件渲染
                        function updateMediaPreview(filename) {
                            previewBox.innerHTML = '';
                            previewToggle.style.display = 'flex';
                            
                            if (!filename || filename === 'None' || filename === 'undefined' || filename === '') {
                                const placeholderImg = document.createElement('img');
                                // 采用主预览同款黑底灰字无损 SVG
                                placeholderImg.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%'><rect width='100%' height='100%' fill='%23555'/><text x='50%' y='50%' fill='%23999' font-size='16' text-anchor='middle' alignment-baseline='middle'>No Media</text></svg>";
                                previewBox.appendChild(placeholderImg);
                                
                                // 占位符状态下我们保持其折叠状态（collapsed）以节省屏幕空间，用户可以手动点击小眼睛展开查看
                                return;
                            }
                            
                            // 如果是真实的媒体资源，自动移除折叠状态进行展开
                            previewBox.classList.remove('collapsed');
                            
                            const fileUrl = `/view?filename=${encodeURIComponent(filename)}&type=input`;
                            let mediaElement;
                            
                            if (mediaType === 'image') {
                                mediaElement = document.createElement('img');
                                mediaElement.src = fileUrl;
                            } else if (mediaType === 'video') {
                                mediaElement = document.createElement('video');
                                mediaElement.src = fileUrl;
                                mediaElement.controls = true;
                            } else if (mediaType === 'audio') {
                                mediaElement = document.createElement('audio');
                                mediaElement.src = fileUrl;
                                mediaElement.controls = true;
                            } else {
                                // 无法识别时：根据文件后缀猜测类型
                                const ext = filename.split('.').pop().toLowerCase();
                                if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) {
                                    mediaElement = document.createElement('video');
                                    mediaElement.src = fileUrl;
                                    mediaElement.controls = true;
                                } else if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext)) {
                                    mediaElement = document.createElement('audio');
                                    mediaElement.src = fileUrl;
                                    mediaElement.controls = true;
                                } else {
                                    mediaElement = document.createElement('img');
                                    mediaElement.src = fileUrl;
                                }
                            }
                            
                            previewBox.appendChild(mediaElement);
                        }
                        
                        previewToggle.onclick = () => {
                            previewBox.classList.toggle('collapsed');
                        };
                        
                        updateMediaPreview(currentValue || 'None');
                        group.appendChild(uploaderContainer);
                    } else if (type === "SEED") {
                        const seedContainer = document.createElement('div');
                        seedContainer.className = 'seed-wrapper';
                        // 1. 顶层大数字 +/- 微调器
                        const wrapper = document.createElement('div');
                        wrapper.className = 'numeric-input-wrapper';
                        const btnMinus = document.createElement('button');
                        btnMinus.type = 'button';
                        btnMinus.className = 'btn-numeric-adjust';
                        btnMinus.innerText = '◀';
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.className = 'number-input';
                        input.value = currentValue ?? 0;
                        input.id = `input_${key}`;
                        input.min = 0;
                        input.max = "18446744073709551615"; 
                        const btnPlus = document.createElement('button');
                        btnPlus.type = 'button';
                        btnPlus.className = 'btn-numeric-adjust';
                        btnPlus.innerText = '▶';
                        // 使用 BigInt 运算防止 JS 浮点数运算在超大数时丢失精度
                        btnMinus.onclick = () => {
                            let val = BigInt(input.value) - 1n;
                            if (val < 0n) val = 0n;
                            input.value = val.toString();
                            input.dispatchEvent(new Event('change'));
                        };
                        btnPlus.onclick = () => {
                            let val = BigInt(input.value) + 1n;
                            const maxVal = 18446744073709551615n;
                            if (val > maxVal) val = maxVal;
                            input.value = val.toString();
                            input.dispatchEvent(new Event('change'));
                        };
                        wrapper.appendChild(btnMinus);
                        wrapper.appendChild(input);
                        wrapper.appendChild(btnPlus);
                        seedContainer.appendChild(wrapper);
                        
                        // 2. 底层 control_after_generate 下拉动作选项
                        const actionRow = document.createElement('div');
                        actionRow.className = 'seed-action-row';
                        
                        const actionLabel = document.createElement('span');
                        actionLabel.className = 'seed-action-label';
                        actionLabel.innerText = t("label_seed_control", "Seed Control");
                        
                        const select = document.createElement('select');
                        select.className = 'seed-action-select';
                        select.id = `input_action_${key}`;
                        const options = ["fixed", "increment", "decrement", "randomize"];
                        options.forEach(opt => {
                            const el = document.createElement('option');
                            el.value = opt;
                            el.innerText = opt;
                            select.appendChild(el);
                        });
                        
                        const btnReuse = document.createElement('button');
                        btnReuse.type = 'button';
                        btnReuse.className = 'btn-numeric-adjust';
                        btnReuse.innerText = '♻️';
                        btnReuse.title = t("lastSeed_desc", 'Reuse Last Seed');
                        btnReuse.onclick = (e) => {
                            e.stopPropagation();
                            // 从全局缓存中抓回上一次在前端生成过的种子值
                            const lastVal = window._lastSeeds ? window._lastSeeds[key] : null;
                            if (lastVal) {
                                input.value = lastVal;
                                input.dispatchEvent(new Event('change'));
                                
                                // 自动将后续动作锁定为 fixed
                                select.value = "fixed";
                                select.dispatchEvent(new Event('change'));
                            } /*else {
                                alert("No previous seed recorded in this session yet!");
                            }*/
                        };
                        
                        // 👈【新增】：随机骰子按钮 (🎲)
                        const btnRand = document.createElement('button');
                        btnRand.type = 'button';
                        btnRand.className = 'btn-numeric-adjust';
                        btnRand.innerText = '🎲';
                        btnRand.title = t("randomSeed_desc", 'Randomize Seed');
                        btnRand.onclick = (e) => {
                            e.stopPropagation();
                            const randVal = Math.floor(Math.random() * 1125899906842624).toString();
                            input.value = randVal;
                            input.dispatchEvent(new Event('change'));
                            
                            // 自动将后续动作锁定为 fixed (锁定该随机种子进行微调)
                            select.value = "fixed";
                            select.dispatchEvent(new Event('change'));
                        };
                        
                        // 自动计算提取 ComfyUI 在 SEED 控件后追加的 control_after_generate 伴生控件
                        const seedWidgetIndex = parentNode ? parentNode.widgets.indexOf(parentWidget) : -1;
                        const companionWidget = (seedWidgetIndex !== -1) ? parentNode.widgets[seedWidgetIndex + 1] : null;
                        if (companionWidget) {
                            select.value = companionWidget.value || "randomize";
                        }
                        // 改变动作时，立即同步回 ComfyUI 主界面
                        select.addEventListener('change', () => {
                            if (companionWidget) {
                                companionWidget.value = select.value;
                                if (companionWidget.callback) companionWidget.callback(select.value);
                            }
                        });
                        actionRow.appendChild(actionLabel);
                        actionRow.appendChild(select);
                        actionRow.appendChild(btnReuse);
                        actionRow.appendChild(btnRand);
                        seedContainer.appendChild(actionRow);
                        
                        group.appendChild(seedContainer);
                    } else {
                        const isMultiline = params.multiline === true;
                        
                        if (isMultiline) {
                            const container = document.createElement('div');
                            container.className = 'input-with-button';
                        
                            const input = document.createElement('textarea');
                            input.className = 'tight-textarea';
                            input.value = currentValue ?? '';
                            input.id = `input_${key}`;
                            input.rows = 1;
                            input.placeholder = params.placeholder || "";
                            container.appendChild(input);
                        
                            const editBtn = document.createElement('button');
                            editBtn.className = 'btn-edit-multiline';
                            editBtn.type = 'button';
                            editBtn.innerText = '📝';
                            editBtn.onclick = () => openMultilineEditor(input, params.name || key);
                            container.appendChild(editBtn);
                        
                            group.appendChild(container);
                        } else {
                            // 2. 如果未开启多行文本：退回最干净的普通单行输入框，完全不渲染 📝 按钮
                            const input = document.createElement('input');
                            input.type = 'text';
                            input.value = currentValue ?? '';
                            input.id = `input_${key}`;
                            
                            if (params.placeholder) input.placeholder = params.placeholder;
                            group.appendChild(input);
                        }
                    }
                    formContainer.appendChild(group);
            }
        }
        
        // 多行编辑器逻辑
        function openMultilineEditor(targetInput, title) {
            activeInputEl = targetInput;
            document.getElementById('modal-title').innerText = t("label_editing", "📝 Editing: {0}", title);
            const modalTextarea = document.getElementById('multiline-textarea');
            modalTextarea.value = targetInput.value;
            if (targetInput.placeholder) {
                modalTextarea.placeholder = targetInput.placeholder;
            } else {
                modalTextarea.placeholder = '';
            }
            document.getElementById('multiline-modal').style.display = 'flex';
            
        }
        document.getElementById('multiline-modal-close').onclick = closeMultilineModal;
        document.getElementById('multiline-btn-cancel').onclick = closeMultilineModal;
        document.getElementById('multiline-btn-save').onclick = () => {
            if (activeInputEl) {
                activeInputEl.value = document.getElementById('multiline-textarea').value;
                activeInputEl.dispatchEvent(new Event('change'));
            }
            closeMultilineModal();
        };
        function closeMultilineModal() {
            document.getElementById('multiline-modal').style.display = 'none';
            activeInputEl = null;
        }
        
        // 带滑动判定与按钮翻页的画廊灯箱大图
        function openLightbox(src) {
            if (src && !src.startsWith('data:image/svg+xml')) {
                const items = Array.from(document.querySelectorAll('.gallery-item'));
                currentImagesList = items.map(img => img.src);
                
                const absoluteSrc = new URL(src, window.location.href).href;
                currentLightboxIndex = currentImagesList.indexOf(absoluteSrc);
                
                if (currentLightboxIndex === -1) {
                    currentImagesList = [absoluteSrc];
                    currentLightboxIndex = 0;
                }
                
                updateLightboxUI();
                document.getElementById('lightbox-modal').style.display = 'flex';
            }
        }
        
        function closeLightbox() {
            const lightboxModal = document.getElementById('lightbox-modal');
            if (lightboxModal) lightboxModal.style.display = 'none';
        }
        
        function updateLightboxUI() {
            const imgUrl = currentImagesList[currentLightboxIndex];
            document.getElementById('lightbox-img').src = imgUrl;
            document.getElementById('main-preview').src = imgUrl;
        }
        
        function navigateLightbox(dir) {
            if (currentImagesList.length <= 1) return;
            currentLightboxIndex += dir;
            
            if (currentLightboxIndex < 0) {
                currentLightboxIndex = currentImagesList.length - 1;
            } else if (currentLightboxIndex >= currentImagesList.length) {
                currentLightboxIndex = 0;
            }
            updateLightboxUI();
        }
        
        function initLightboxEvents() {
            const lightboxModal = document.getElementById('lightbox-modal');
            
            document.getElementById('lightbox-prev').onclick = (e) => {
                e.stopPropagation(); 
                navigateLightbox(-1);
            };
            document.getElementById('lightbox-next').onclick = (e) => {
                e.stopPropagation();
                navigateLightbox(1);
            };
            
            let swipeStartX = 0;
            lightboxModal.addEventListener('touchstart', (e) => {
                swipeStartX = e.touches[0].clientX;
            }, {passive: true});
            
            lightboxModal.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].clientX;
                const diffX = endX - swipeStartX;
                if (Math.abs(diffX) > 50) { 
                    if (diffX > 0) {
                        navigateLightbox(-1); 
                    } else {
                        navigateLightbox(1);  
                    }
                }
            }, {passive: true});
            
            lightboxModal.onclick = (e) => {
                if (e.target.id === 'lightbox-modal' || e.target.id === 'lightbox-close') {
                    lightboxModal.style.display = 'none';
                }
            };
            
            // 👇【核心新增】：绑定键盘物理方向键左右翻页、及 ESC 键一键退出大图灯箱
            document.addEventListener('keydown', (e) => {
                const lightboxModal = document.getElementById('lightbox-modal');
                // 只有当灯箱大图处于完全显示（flex）状态下，才拦截物理按键事件，防止误触
                if (lightboxModal && lightboxModal.style.display === 'flex') {
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault(); // 阻止默认的网页左右滚动
                        navigateLightbox(-1); // 上一张
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        navigateLightbox(1);  // 下一张
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        closeLightbox(); // 👈 ESC 一键优雅退出
                    }
                }
            });
        }
        
        // 📐【精准视觉锚定版】：高度拖拽器逻辑
        function initLogResizeLogic() {
            const logResizer = document.getElementById('log-resizer');
            const logContainer = document.getElementById('log-drawer-container');
            const mainLayout = document.querySelector('.main-layout');
            const logContent = document.getElementById('log-content');
            let isDraggingLog = false;
            
            // 👈 新增：用来记录拖拽开始时，视口底部对齐的那行字所在的绝对 Y 轴坐标
            let dragVisibleBottomY = 0;
            
            logResizer.addEventListener('mousedown', startLogDrag);
            logResizer.addEventListener('touchstart', startLogDrag, { passive: false });
            
            function startLogDrag(e) {
                e.preventDefault();
                isDraggingLog = true;
                logContainer.classList.add('dragging');
                mainLayout.style.pointerEvents = 'none';
                document.body.style.cursor = 'row-resize';
                
                // 👈【核心锁定】：记录拖拽开始瞬间，视口最底部边缘对应整个文档的绝对 Y 坐标
                if (logContent) {
                    dragVisibleBottomY = logContent.scrollTop + logContent.clientHeight;
                }
                
                document.addEventListener('mousemove', logDrag);
                document.addEventListener('touchmove', logDrag, { passive: false });
                document.addEventListener('mouseup', stopLogDrag);
                document.addEventListener('touchend', stopLogDrag);
            }
            
            function logDrag(e) {
                if (!isDraggingLog) return;
                if (e.cancelable) e.preventDefault(); // 阻止 iOS 橡皮筋回弹
                
                const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                const totalHeight = window.innerHeight;
                let newHeight = totalHeight - clientY;
                
                // 调节范围保护
                if (newHeight < 100) newHeight = 100;
                if (newHeight > totalHeight - 150) newHeight = totalHeight - 150;
                
                logContainer.style.height = `${newHeight}px`;
                localStorage.setItem('appview_log_height', newHeight);
                
                // 👈【核心数学对齐校正】：
                // 用拖拽开始时锁定的 Y 坐标，减去当前的视口高度，动态计算并写入最新的滚动距离。
                // 这样就能确保“拖放开始时”显示在最底部的最后一行字，在缩放时雷打不动地钉在最底部！
                if (logContent) {
                    let targetScrollTop = dragVisibleBottomY - logContent.clientHeight;
                    
                    // 安全边界控制（不能低于 0 且不能超过最大滚动范围）
                    const maxScroll = logContent.scrollHeight - logContent.clientHeight;
                    if (targetScrollTop < 0) targetScrollTop = 0;
                    if (targetScrollTop > maxScroll) targetScrollTop = maxScroll;
                    
                    logContent.scrollTop = targetScrollTop;
                }
            }
            
            function stopLogDrag() {
                isDraggingLog = false;
                logContainer.classList.remove('dragging');
                mainLayout.style.pointerEvents = 'auto';
                document.body.style.cursor = '';
                
                document.removeEventListener('mousemove', logDrag);
                document.removeEventListener('touchmove', logDrag);
                document.removeEventListener('mouseup', stopLogDrag);
                document.removeEventListener('touchend', stopLogDrag);
                
                logHeight = parseInt(logContainer.style.height);
            }
        }
        
        // 自适应拖拽逻辑（已深度整合 ChatGPT 优化机制）
        function initResizeLogic() {
            const resizer = document.getElementById('resizer');
            const viewerContainer = document.querySelector('.viewer-container');
            const rightPanel = document.querySelector('.right-panel');
            let isDragging = false;
            
            resizer.addEventListener('mousedown', startDrag);
            resizer.addEventListener('touchstart', startDrag, { passive: false });
            
            function startDrag(e) {
                e.preventDefault();
                isDragging = true;
                resizer.classList.add('dragging');
                
                viewerContainer.style.pointerEvents = 'none';
                rightPanel.style.pointerEvents = 'none';
                
                const isDesktop = window.innerWidth >= 768;
                document.body.style.cursor = isDesktop ? 'col-resize' : 'row-resize';
                
                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag, { passive: false });
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);
            }
            
            function drag(e) {
                if (!isDragging) return;
                const isDesktop = window.innerWidth >= 768;
                
                const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                
                if (isDesktop) {
                    const totalWidth = window.innerWidth;
                    let newWidth = totalWidth - clientX;
                    
                    if (newWidth < 250) newWidth = 250;
                    if (newWidth > totalWidth - 150) newWidth = totalWidth - 150;
                    
                    // GPT 机制：同步设置 flexBasis 与 width 保证拖拽极其稳定
                    rightPanel.style.flexBasis = `${newWidth}px`;
                    rightPanel.style.width = `${newWidth}px`;
                    localStorage.setItem('appview_panel_width', newWidth); 
                } else {
                    let newHeight = clientY;
                    const totalHeight = window.innerHeight;
                    let minHeight = 148;
                    //if (!isSafari()) minHeight = 147;
                    if (newHeight < minHeight) newHeight = minHeight;
                    if (newHeight > totalHeight - minHeight) newHeight = totalHeight - minHeight;
                    
                    viewerContainer.style.flex = `0 0 ${newHeight}px`;
                    localStorage.setItem('appview_preview_height', newHeight); 
                }
            }
            
            // 恢复事件状态
            function stopDrag() {
                isDragging = false;
                resizer.classList.remove('dragging');
                
                viewerContainer.style.pointerEvents = 'auto';
                rightPanel.style.pointerEvents = 'auto';
                document.body.style.cursor = '';
                
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('touchmove', drag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchend', stopDrag);
            }
        }
        
        // 发起生成请求（数据落盘并触发回调通知）
        document.getElementById('btn-run').addEventListener('click', async () => {
            if (!window.comfyApp || !sourceNodeId) return alert(t("lost_connection","Lost connection to ComfyUI!"));
            const node = window.comfyApp.graph.getNodeById(sourceNodeId);
            if (!node) return alert(t("node_notfound", "Original node not found!"));
            
            const seedActionSelects = document.querySelectorAll('.seed-action-select');
            seedActionSelects.forEach(select => {
                if (select.value === 'randomize') {
                    const seedKey = select.id.replace('input_action_', '');
                    const seedInput = document.getElementById(`input_${seedKey}`);
                    if (seedInput) {
                        const newSeed = Math.floor(Math.random() * 1125899906842624).toString()
                        seedInput.value = newSeed;
                        seedInput.dispatchEvent(new Event('change')); // 派发事件同步给主界面
                    }
                }
            });
            
            for (const widget of node.widgets) {
                const inputEl = document.getElementById(`input_${widget.name}`);
                if (inputEl) {
                    let newValue;
                    if (inputEl.type === 'checkbox') {
                        newValue = inputEl.checked;
                    } else if (inputEl.type === 'number' || inputEl.type === 'range') {
                        newValue = Number(inputEl.value);
                    } else {
                        newValue = inputEl.value;
                    }
                    
                    if (widget.value !== newValue) {
                        widget.value = newValue;
                        if (widget.callback) widget.callback(newValue); // 执行原生回调保障工作流感知状态变动
                    }
                    
                    if (document.getElementById(`input_action_${widget.name}`)) {
                        window._lastSeeds = window._lastSeeds || {};
                        window._lastSeeds[widget.name] = inputEl.value;
                    }
                }
            }
            const batchInput = document.getElementById('input-batch-count');
            const batchCount = batchInput ? Math.max(1, parseInt(batchInput.value) || 1) : 1;
            batchInput.value = batchCount;
            
            window.comfyApp.queuePrompt(0, batchCount); 
        });
        
        // 停止请求
        document.getElementById('btn-stop').addEventListener('click', () => {
            fetch('/interrupt', { method: 'POST' }).catch(err => console.error("Interrupt failed:", err));
        });
    </script>
