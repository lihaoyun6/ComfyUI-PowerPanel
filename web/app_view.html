        }
        
        // 多行编辑器逻辑
        function openMultilineEditor(targetInput, title) {
            activeInputEl = targetInput;
            document.getElementById('modal-title').innerText = t("label_editing", "📝 Editing: {0}", title);
            const modalTextarea = document.getElementById('multiline-textarea');
            modalTextarea.value = targetInput.value;
            if (targetInput.placeholder) {
                modalTextarea.placeholder = targetInput.placeholder;
            } else {
                modalTextarea.placeholder = '';
            }
            document.getElementById('multiline-modal').style.display = 'flex';
            
        }
        document.getElementById('multiline-modal-close').onclick = closeMultilineModal;
        document.getElementById('multiline-btn-cancel').onclick = closeMultilineModal;
        document.getElementById('multiline-btn-save').onclick = () => {
            if (activeInputEl) {
                activeInputEl.value = document.getElementById('multiline-textarea').value;
                activeInputEl.dispatchEvent(new Event('change'));
            }
            closeMultilineModal();
        };
        function closeMultilineModal() {
            document.getElementById('multiline-modal').style.display = 'none';
            activeInputEl = null;
        }
        
        // 带滑动判定与按钮翻页的画廊灯箱大图
        function openLightbox(src) {
            if (src && !src.startsWith('data:image/svg+xml')) {
                const items = Array.from(document.querySelectorAll('.gallery-item'));
                currentImagesList = items.map(img => img.src);
                
                const absoluteSrc = new URL(src, window.location.href).href;
                currentLightboxIndex = currentImagesList.indexOf(absoluteSrc);
                
                if (currentLightboxIndex === -1) {
                    currentImagesList = [absoluteSrc];
                    currentLightboxIndex = 0;
                }
                
                updateLightboxUI();
                document.getElementById('lightbox-modal').style.display = 'flex';
            }
        }
        
        function closeLightbox() {
            const lightboxModal = document.getElementById('lightbox-modal');
            if (lightboxModal) lightboxModal.style.display = 'none';
        }
        
        // 🖼️【灯箱控制 1】：更新大图及边缘按钮状态
        function updateLightboxUI() {
            const imgUrl = currentImagesList[currentLightboxIndex];
            document.getElementById('lightbox-img').src = imgUrl;
            //document.getElementById('main-preview').src = imgUrl;
            
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');
            
            if (prevBtn && nextBtn) {
                // 🟢【新增】：如果到第一张，隐藏左箭头；如果到最后一张，隐藏右箭头，直观提示用户已到尽头
                prevBtn.style.display = (currentLightboxIndex === 0) ? 'none' : 'flex';
                nextBtn.style.display = (currentLightboxIndex === currentImagesList.length - 1) ? 'none' : 'flex';
            }
        }
        
        // 🖼️【灯箱控制 2】：非循环翻页逻辑
        function navigateLightbox(dir) {
            if (currentImagesList.length <= 1) return;
            
            const nextIndex = currentLightboxIndex + dir;
            
            // 🚫【核心修改】：阻止循环切换。超出边界（小于0或大于最后一张）时直接拦截，不做任何操作
            if (nextIndex < 0 || nextIndex >= currentImagesList.length) {
                return; 
            }
            
            currentLightboxIndex = nextIndex;
            updateLightboxUI();
        }
        
        function initLightboxEvents() {
            const lightboxModal = document.getElementById('lightbox-modal');
            
            document.getElementById('lightbox-prev').onclick = (e) => {
                e.stopPropagation(); 
                navigateLightbox(-1);
            };
            document.getElementById('lightbox-next').onclick = (e) => {
                e.stopPropagation();
                navigateLightbox(1);
            };
            
            let swipeStartX = 0;
            lightboxModal.addEventListener('touchstart', (e) => {
                swipeStartX = e.touches[0].clientX;
            }, {passive: true});
            
            lightboxModal.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].clientX;
                const diffX = endX - swipeStartX;
                if (Math.abs(diffX) > 50) { 
                    if (diffX > 0) {
                        navigateLightbox(-1); 
                    } else {
                        navigateLightbox(1);  
                    }
                }
            }, {passive: true});
            
            lightboxModal.onclick = (e) => {
                if (e.target.id === 'lightbox-modal' || e.target.id === 'lightbox-close') {
                    lightboxModal.style.display = 'none';
                }
            };
            
            // 👇【核心新增】：绑定键盘物理方向键左右翻页、及 ESC 键一键退出大图灯箱
            document.addEventListener('keydown', (e) => {
                const lightboxModal = document.getElementById('lightbox-modal');
                // 只有当灯箱大图处于完全显示（flex）状态下，才拦截物理按键事件，防止误触
                if (lightboxModal && lightboxModal.style.display === 'flex') {
                    if (e.key === 'ArrowLeft') {
                        e.preventDefault(); // 阻止默认的网页左右滚动
                        navigateLightbox(-1); // 上一张
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        navigateLightbox(1);  // 下一张
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        closeLightbox(); // 👈 ESC 一键优雅退出
                    }
                }
            });
        }
        
        // 📐【手机端双向联动核心引擎 - 保护修复版】
        function applyMobileLayout(targetLogHeight) {
            const isDesktop = window.innerWidth >= 768;
            if (isDesktop) return; 
            
            const logContainer = document.getElementById('log-drawer-container');
            const viewerContainer = document.querySelector('.viewer-container');
            if (!logContainer || !viewerContainer) return;
            
            const totalHeight = window.innerHeight;
            const minRightPanelHeight = 149; 
            const minViewerHeight = 110;
            
            let preferredPreviewHeight = parseInt(localStorage.getItem('appview_preview_height'));
            if (isNaN(preferredPreviewHeight)) {
                preferredPreviewHeight = totalHeight * 0.3;
            }
            
            const maxLogHeight = totalHeight - minViewerHeight - minRightPanelHeight;
            let finalLogHeight = targetLogHeight;
            if (finalLogHeight > maxLogHeight) finalLogHeight = maxLogHeight;
            if (finalLogHeight < 0) finalLogHeight = 0;
            
            let expectedRightPanelHeight = totalHeight - preferredPreviewHeight;
            let actualViewerHeight = totalHeight - finalLogHeight - expectedRightPanelHeight;
            
            if (actualViewerHeight < minViewerHeight) {
                actualViewerHeight = minViewerHeight;
            }
            
            viewerContainer.style.flex = `0 0 ${actualViewerHeight}px`;
            logContainer.style.height = `${finalLogHeight}px`;
            
            // 🟢【重要修复】：只有当实际渲染高度 > 0（打开状态下）时，才去改写全局记忆 logHeight
            // 这样点击关闭（finalLogHeight = 0）时，全局记忆依然是关闭前那个健康的（比如 250px）数值
            if (finalLogHeight > 0) {
                logHeight = finalLogHeight;
                localStorage.setItem('appview_log_height', finalLogHeight);
            }
        }
        
        // 📐【自包含完整版】：底部日志抽屉拖拽控制
        function initLogResizeLogic() {
            const logResizer = document.getElementById('log-resizer');
            const logContainer = document.getElementById('log-drawer-container');
            const mainLayout = document.querySelector('.main-layout');
            const logContent = document.getElementById('log-content');
            const viewerContainer = document.querySelector('.viewer-container');
            const rightPanel = document.querySelector('.right-panel');
            
            let isDraggingLog = false;
            let dragVisibleBottomY = 0;
            let initialRightPanelHeight = 0; // 记录拖放开始时右面板的物理高度
            
            if (!logResizer) return;
            
            logResizer.addEventListener('mousedown', startLogDrag);
            logResizer.addEventListener('touchstart', startLogDrag, { passive: false });
            
            function startLogDrag(e) {
                e.preventDefault();
                isDraggingLog = true;
                logContainer.classList.add('dragging');
                mainLayout.style.pointerEvents = 'none';
                document.body.style.cursor = 'row-resize';
                
                // 记录拖拽开始瞬间，视口最底部边缘对应的绝对 Y 坐标
                if (logContent) {
                    dragVisibleBottomY = logContent.scrollTop + logContent.clientHeight;
                }
                
                // 手机端下记录右面板拖拽开始前的初始物理高度
                const isDesktop = window.innerWidth >= 768;
                if (!isDesktop && rightPanel) {
                    initialRightPanelHeight = rightPanel.clientHeight;
                }
                
                document.addEventListener('mousemove', logDrag);
                document.addEventListener('touchmove', logDrag, { passive: false });
                document.addEventListener('mouseup', stopLogDrag);
                document.addEventListener('touchend', stopLogDrag);
            }
            
            function logDrag(e) {
                if (!isDraggingLog) return;
                if (e.cancelable) e.preventDefault(); // 阻止手机浏览器弹性拉伸
                
                const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                const totalHeight = window.innerHeight;
                let newHeight = totalHeight - clientY;
                
                // 1. 限制抽屉本身最小高度 100px
                if (newHeight < 100) newHeight = 100;
                
                const isDesktop = window.innerWidth >= 768;
                const safetyMargin = isDesktop ? 220 : 260; 
                
                // 2. 限制最大高度，不能顶死主界面
                if (newHeight > totalHeight - safetyMargin) {
                    newHeight = totalHeight - safetyMargin;
                }
                
                if (isDesktop) {
                    // 💻 电脑端：只控制日志抽屉高度
                    logContainer.style.height = `${newHeight}px`;
                    logHeight = newHeight;
                    localStorage.setItem('appview_log_height', newHeight);
                } else {
                    // 📱 手机端：走自适应双向推挤引擎
                    applyMobileLayout(newHeight);
                }
                
                // 3. 精准视觉对齐锚定
                if (logContent) {
                    let targetScrollTop = dragVisibleBottomY - logContent.clientHeight;
                    const maxScroll = logContent.scrollHeight - logContent.clientHeight;
                    if (targetScrollTop < 0) targetScrollTop = 0;
                    if (targetScrollTop > maxScroll) targetScrollTop = maxScroll;
                    logContent.scrollTop = targetScrollTop;
                }
            }
            
            function stopLogDrag() {
                isDraggingLog = false;
                logContainer.classList.remove('dragging');
                mainLayout.style.pointerEvents = 'auto';
                document.body.style.cursor = '';
                
                document.removeEventListener('mousemove', logDrag);
                document.removeEventListener('touchmove', logDrag);
                document.removeEventListener('mouseup', stopLogDrag);
                document.removeEventListener('touchend', stopLogDrag);
                
                // 停止时同步最新高度
                if (logContainer) {
                    logHeight = parseInt(logContainer.style.height) || logHeight;
                }
            }
        }
        
        // 📐【自包含完整版 - 双向无缝对齐修复】
        function initResizeLogic() {
            const resizer = document.getElementById('resizer');
            const viewerContainer = document.querySelector('.viewer-container');
            const rightPanel = document.querySelector('.right-panel');
            const logContainer = document.getElementById('log-drawer-container');
            let isDragging = false;
            
            if (!resizer) return;
            
            resizer.addEventListener('mousedown', startDrag);
            resizer.addEventListener('touchstart', startDrag, { passive: false });
            
            function startDrag(e) {
                e.preventDefault();
                isDragging = true;
                resizer.classList.add('dragging');
                
                viewerContainer.style.pointerEvents = 'none';
                rightPanel.style.pointerEvents = 'none';
                
                const isDesktop = window.innerWidth >= 768;
                document.body.style.cursor = isDesktop ? 'col-resize' : 'row-resize';
                
                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag, { passive: false });
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);
            }
            
            function drag(e) {
                if (!isDragging) return;
                const isDesktop = window.innerWidth >= 768;
                
                const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
                const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
                
                if (isDesktop) {
                    const totalWidth = window.innerWidth;
                    let newWidth = totalWidth - clientX;
                    
                    if (newWidth < 250) newWidth = 250;
                    if (newWidth > totalWidth - 150) newWidth = totalWidth - 150;
                    
                    rightPanel.style.flexBasis = `${newWidth}px`;
                    rightPanel.style.width = `${newWidth}px`;
                    localStorage.setItem('appview_panel_width', newWidth); 
                } else {
                    let newHeight = clientY;
                    const totalHeight = window.innerHeight;
                    
                    if (newHeight < 110) newHeight = 110; 
                    
                    const minRightPanelHeight = 149; 
                    
                    // 双向限制
                    if (isLogOpen) {
                        const availableSpaceForLog = totalHeight - newHeight - minRightPanelHeight;
                        if (logHeight > availableSpaceForLog) {
                            let tempLogHeight = availableSpaceForLog;
                            
                            if (tempLogHeight < 100) {
                                tempLogHeight = 100;
                            } else {
                                if (logContainer) logContainer.style.height = `${tempLogHeight}px`;
                                logHeight = tempLogHeight; 
                                localStorage.setItem('appview_log_height', logHeight);
                            }
                        }
                    }
                    
                    const absoluteMaxViewerHeight = totalHeight - (isLogOpen ? logHeight : 0) - minRightPanelHeight;
                    if (newHeight > absoluteMaxViewerHeight) {
                        newHeight = absoluteMaxViewerHeight;
                    }
                    
                    viewerContainer.style.flex = `0 0 ${newHeight}px`;
                    
                    // 🟢【核心数学修复】：
                    // 我们不把当前“被压扁的大图高度”存入缓存，而是存入“隐含的未挤压首选高度”
                    // 隐含高度 = 当前拉出的高度 + 占用的日志高度
                    const impliedPreferredHeight = newHeight + (isLogOpen ? logHeight : 0);
                    localStorage.setItem('appview_preview_height', impliedPreferredHeight); 
                }
            }
            
            function stopDrag() {
                isDragging = false;
                resizer.classList.remove('dragging');
                
                viewerContainer.style.pointerEvents = 'auto';
                rightPanel.style.pointerEvents = 'auto';
                document.body.style.cursor = '';
                
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('touchmove', drag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchend', stopDrag);
            }
        }
        
        // 发起生成请求（数据落盘并触发回调通知）
        document.getElementById('btn-run').addEventListener('click', async () => {
            if (!window.comfyApp || !sourceNodeId) return alert(t("lost_connection","Lost connection to ComfyUI!"));
            const node = window.comfyApp.graph.getNodeById(sourceNodeId);
            if (!node) return alert(t("node_notfound", "Original node not found!"));
            
            const seedActionBtns = document.querySelectorAll('[id^="input_action_btn_"]');
            seedActionBtns.forEach(btn => {
                if (btn.innerText === '🔀') {
                    const seedKey = btn.id.replace('input_action_btn_', '');
                    const seedInput = document.getElementById(`input_${seedKey}`);
                    if (seedInput) {
                        const newSeed = Math.floor(Math.random() * 1125899906842624).toString();
                        seedInput.value = newSeed;
                        seedInput.dispatchEvent(new Event('change')); // 派发事件同步给主界面
                    }
                }
            });
            
            for (const widget of node.widgets) {
                const inputEl = document.getElementById(`input_${widget.name}`);
                if (inputEl) {
                    let newValue;
                    if (inputEl.type === 'checkbox') {
                        newValue = inputEl.checked;
                    } else if (inputEl.type === 'number' || inputEl.type === 'range') {
                        newValue = Number(inputEl.value);
                    } else {
                        newValue = inputEl.value;
                    }
                    
                    if (widget.value !== newValue) {
                        widget.value = newValue;
                        if (widget.callback) widget.callback(newValue); // 执行原生回调保障工作流感知状态变动
                    }
                    
                    if (document.getElementById(`input_action_${widget.name}`)) {
                        window._lastSeeds = window._lastSeeds || {};
                        window._lastSeeds[widget.name] = inputEl.value;
                    }
                }
            }
            const batchInput = document.getElementById('input-batch-count');
            const batchCount = batchInput ? Math.max(1, parseInt(batchInput.value) || 1) : 1;
            batchInput.value = batchCount;
            
            window.comfyApp.queuePrompt(0, batchCount); 
        });
        
        // 停止请求
        document.getElementById('btn-stop').addEventListener('click', () => {
            fetch('/interrupt', { method: 'POST' }).catch(err => console.error("Interrupt failed:", err));
        });
    </script>
</body>
