<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ComfyUI AppBuilder</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #000000;
            --bg-color: #1c1c1c;
            --bg-badge: rgba(255,255,255,0.3);
            --panel-bg: #393939;
            --primary: #4CAF50;
            --second: #418a44;
            --text: #FFFFFF;
            --title: #AAAAAA;
            --border: #555555;
            --border-neg: #D8D8D8;
            --shadow: rgb(0,0,0,0.7);
            --red: #dc4125;
        }
        
        /* 🌓 浅色主题（点击按钮时激活） */
        :root.light-theme {
            color-scheme: light;
            --bg: #fafafa;
            --bg-color: #F1F1F1;
            --bg-badge: rgba(128,128,128,0.4);
            --panel-bg: #FFFFFF;
            --primary: #4CAF50;
            --second: #5acc5e;
            --text: #000000;
            --title: #555555;
            --border: #D8D8D8;
            --border-neg: #333333;
            --shadow: rgb(0,0,0,0.);
            --red: #dc4125;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body {
            overscroll-behavior-y: none; 
            overscroll-behavior: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column;  height: 100dvh; overflow: hidden; 
            /* 👈【核心新增】：全局禁用文本框选与长按手势（彻底解决长按击穿Bug） */
            -webkit-user-select: none; /* iOS Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+ */
            user-select: none;         /* Standard */
            -webkit-touch-callout: none; /* 彻底杜绝全局无关元素的触控反馈 */
        }
        
        /* 👈【核心新增】：仅限需要输入文字的“真实控件”和“灯箱大图”予以白名单放行，恢复原生菜单 */
        input, select, textarea, #lightbox-img {
            -webkit-user-select: auto !important;
            user-select: auto !important;
            -webkit-touch-callout: default !important; /* 👈 允许 iOS 弹出原生打字菜单与大图保存菜单 */
        }

        /* 👈 极致优化：屏蔽手机端双击缩放行为并消除点击延时 */
        body, button, input, select, textarea, .segmented-toggle, .gallery-item {
            touch-action: manipulation;
        }

        /* 实时进度条容器 */
        .progress-bar-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background-color: transparent; z-index: 99999; pointer-events: none;
        }
        .progress-bar-fill {
            width: 0%; height: 100%; background-color: var(--primary);
            transition: width 0.1s ease-out; box-shadow: 0 0 8px var(--primary);
        }

        /* 左侧/顶部：纯大图展示区 */
        .viewer-container {
            display: flex; flex-direction: column;
            flex: 0 0 30dvh; /* 手机端初始占用 30% 高度 */
            background-color: #000; overflow: hidden;
        }

        .preview-section {
            flex: 1; background-color: var(--bg); display: flex; justify-content: center;
            position: relative; overflow: hidden; padding: 46px 8px 8px 8px; align-items: center;
        }
        
        #main-preview { 
            max-width: 100%; max-height: 100%; object-fit: contain; 
            pointer-events: none; user-select: none; -webkit-user-drag: none; 
        }

        .gallery-container { 
            display: flex; align-items: center; padding: 0 16px; gap: 8px; height: 72px;
            background-color: var(--bg); border-top: 1px solid var(--border);
            border-top-left-radius: 24px; border-top-right-radius: 24px; padding-top: 8px;
            overflow: hidden; /* 👈 彻底锁死外层滚动，阻断弹性影响 */
        }
        
        /* 2. 内层滚动区：专门负责图片的排布与弹性横向滚动 */
        .gallery-scroll-wrap {
            flex: 1; display: flex; overflow-x: auto; overflow-y: hidden; align-items: center;
            height: 100%; gap: 8px; touch-action: pan-x; padding: 5px 0;
        }
        .gallery-scroll-wrap::-webkit-scrollbar { display: none; }
        
        /* 3. 历史图片尺寸 */
        .gallery-item {
            height: 60px; border-radius: 6px; object-fit: cover; flex-shrink: 0;
            border: 2px solid var(--border); cursor: pointer; user-select: none; -webkit-user-drag: none;
        }
        
        /* 4. 清除按钮：作为静止的兄弟节点，彻底免疫弹性回弹 */
        .gallery-clear-btn {
            flex-shrink: 0;
            width: 3rem; height: 60px; border-radius: 8px;
            background-color: #444; border: none;
            color: #FFF; font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .gallery-clear-btn:hover { background-color: var(--red); }
        .gallery-item-placeholder {
            width: 60px; height: 60px; border-radius: 6px; flex-shrink: 0;
            background-color: var(--panel-bg); border: 2px solid var(--border);
            animation: galleryPulse 1.5s infinite ease-in-out;
        }
        @keyframes galleryPulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

        .status-badge {
            position: absolute; top: 10px; right: 50px; background: var(--border); height: 24px;
            padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; color: var(--title); z-index: 10;
            border: 1px solid var(--title); text-shadow: 0px 1px 0px var(--panel-bg);
        }
        @supports (-webkit-hyphens: none) {
            .status-badge { right: 55px; }
        }
        
        .back-badge { display: none; width: 32px !important; left: 10px; right: auto; color: #FFF; background-color: #d13d22; border: 1px solid #e6583e; text-shadow: none;}

        /* 拖拽调节器 */
        .resizer {
            height: 18px; width: 100%; cursor: row-resize; flex-shrink: 0;
            position: relative; z-index: 100; user-select: none; background-color: var(--bg-color);
        }
        .resizer::after {
            content: ''; position: absolute; left: 50%; top: 8px; transform: translate(-50%, -50%);
            width: 100px; height: 4px; background: var(--title); border-radius: 2px;
        }

        /* 右侧面板 */
        .right-panel {
            flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; border-top: 2px solid var(--border);
            box-shadow: 0px 0px 30px var(--shadow); border-top-left-radius: 24px; border-top-right-radius: 24px;
        }

        /* 紧凑参数区：由于画廊手机端在最下侧，Padding只需要 150px（按钮+画廊） */
        .controls-section {
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 12px 16px; padding-bottom: 150px; background-color: var(--bg-color);
        }
        .controls-section::-webkit-scrollbar { display: none; }
        .control-group { margin-bottom: 8px;}
        
        /* 1. 父容器 Label：改为 Flex 布局 */
        .control-group label.control-title {
            display: flex;                  /* 开启 flex 布局 */
            align-items: center;            /* 垂直居中，确保文字和气泡对齐 */
            justify-content: space-between; /* 两端对齐：文字在左，气泡在右 */
            margin-bottom: 3px; 
            font-size: 13px; 
            color: var(--title);
            /* ⚠️ 注意：这里删除了 overflow: hidden 等属性，移交给了下面的子元素 */
        }
        
        /* 2. 处理左侧的文本 span（实现过长省略号） */
        .control-group label.control-title span:first-child {
            flex: 1;                        /* 占据剩余的所有空间 */
            min-width: 0;                   /* Flex 子元素文字截断的必加属性 */
            white-space: nowrap;            /* 不换行 */
            overflow: hidden;               /* 隐藏溢出部分 */
            text-overflow: ellipsis;        /* 超出部分显示省略号... */
            padding-right: 8px;             /* 给文字和右侧气泡留一点安全间距 */
        }
        
        /* 3. 处理右侧的 Badge 气泡 */
        .slider-value-badge {
            flex-shrink: 0;                 /* 🌟 核心：无论左边文字多长，绝不压缩气泡 */
            display: inline-block;          /* 🌟 修复底部缺一块的问题（恢复完整盒模型） */
            
            /* 下面是你原有的气泡样式 */
            background: rgba(255, 255, 255, 0.06); 
            border: 1px solid var(--border); 
            padding: 1px 6px;
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold; 
            font-family: monospace;
            color: var(--title); 
            background-color: var(--panel-bg);
            user-select: none;
        }
        
        input[type="text"], select {
            width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); font-family: monospace;
            background: var(--panel-bg); color: var(--text); font-size: 14px; appearance: none; height: 36px;
        }
        input[type="number"] {
            width: 100%; padding: 8px 10px; background: var(--panel-bg); color: var(--text); font-size: 14px; appearance: none;
            border: none; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); border-radius: 0px;
            height: 36px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: rtl;
        }

        /* 👈 核心修改：紧凑型文本域（用来代替input[type="text"]以原生支持多行换行） */
        textarea.tight-textarea {
            width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--panel-bg); color: var(--text); font-size: 14px; height: 36px;
            resize: none; white-space: pre-wrap; line-height: 18px; overflow-y: hidden;
        }
        textarea.tight-textarea:focus { outline: none; border-color: var(--primary); }

        /* 1. 基础容器 (Chrome/Safari/Firefox 均生效) */
        input[type="range"] {
            -webkit-appearance: none;
            -moz-appearance: none; /* 强制 Firefox 允许重写 */
            appearance: none;
            width: 100%;
            height: 36px; /* 轨道厚度，胶囊样式 */
            background: var(--panel-bg); /* 未选中区域底色（跟随你的面板背景） */
            border: 1px solid var(--border); /* 加上边框，和你的文本框风格统一 */
            border-radius: 18px;
            outline: none;
            overflow: hidden; /* 【核心黑科技】：用于裁切滑块产生的巨大阴影，伪装成进度条 */
            margin: 4px 0;
            touch-action: none; 
        }
        
        /* 2. WebKit (Chrome / Edge / Safari / 安卓 / iOS) 的滑块 */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 34px; /* 滑块与内部轨道同高 (36px - 2px边框) */
            height: 34px;
            background: var(--primary); 
            border-radius: 50%;
            cursor: pointer;
            /* 利用向左偏移的巨大阴影，强行画出左侧的绿色进度条 */
            box-shadow: -1016px 0 0 1000px var(--second); 
        }
        
        /* 3. 针对 Firefox 的滑块 (核心修复：使用一模一样的阴影黑科技) */
        input[type="range"]::-moz-range-thumb {
            width: 34px;
            height: 34px;
            background: var(--primary); 
            border: none; /* Firefox 默认带有丑陋的灰色边框，必须清除 */
            border-radius: 50%;
            cursor: pointer;
            /* 一模一样的偏移量，保证和 WebKit 100% 视觉同步 */
            box-shadow: -1016px 0 0 1000px var(--second); 
        }
        
        /* 4. 清除 Firefox 的默认轨道，防止套娃导致错位 */
        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 36px;
            background: transparent;
            border: none; /* 去除多余边框 */
        }
        
        /* 5. 彻底停用 Firefox 的独立进度条，因为我们已经有阴影了 */
        input[type="range"]::-moz-range-progress {
            background: transparent;
            border: none;
        }

        /* 数字加减微调器 */
        .numeric-input-wrapper { display: flex; align-items: center; width: 100%; gap: 0px; }
        .numeric-input-wrapper input { flex: 1; text-align: center; }
        .btn-numeric-adjust {
            background: var(--panel-bg); border: 1px solid var(--border); color: var(--title);
            width: 2.5rem; height: 36px; cursor: pointer; font-size: 18px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .btn-numeric-adjust-right { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
        .btn-numeric-adjust-left { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .btn-numeric-adjust:hover { background: var(--border); }

        /* 双段开关式 BOOLEAN */
        .segmented-toggle {
            width: 100%; height: 36px; background: var(--panel-bg); border: 1px solid var(--border);
            border-radius: 8px; position: relative; cursor: pointer; overflow: hidden;
        }
        .toggle-track { display: flex; height: 100%; position: relative; z-index: 1; }
        .toggle-label-half {
            flex: 1; display: flex; align-items: center; justify-content: center; user-select: none;
            font-size: 13px; font-weight: bold; color: var(--text); transition: color 0.2s; z-index: 2; 
        }
        .toggle-thumb {
            position: absolute; top: 2px; left: 2px; height: calc(100% - 4px);
            width: calc(50% - 4px); background: var(--border); border-radius: 6px;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s; z-index: 1;
        }
        input[type="checkbox"]:checked + .toggle-track .toggle-thumb {
            transform: translateX(calc(100% + 4px)); background: var(--primary);
        }
        input[type="checkbox"]:checked + .toggle-track .toggle-label-half[data-val="true"] { color: #fff; }
        input[type="checkbox"]:not(:checked) + .toggle-track .toggle-label-half[data-val="false"] { color: #fff; }

        /* 多行编辑包装器 */
        .input-with-button { display: flex; gap: 6px; width: 100%; }
        .btn-edit-multiline {
            background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; width: 2.5rem; height: 72px; 
            flex-shrink: 0; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
        }
        .btn-edit-multiline:hover { background: var(--border); }
        
        /* 👇 新增：让多行编辑容器内的输入框自适应剩余空间，不再霸道地占用 100% 宽度 */
        .input-with-button input, .input-with-button textarea { flex: 1; width: auto; }
        
        /* 👇 新增控制行容器，让上传框和切换预览按钮横向并排 */
        .uploader-control-row { display: flex; gap: 6px; width: 100%; }
        .uploader-dropzone {
            flex: 1; padding: 10px; border: 2px dashed var(--border); border-radius: 8px;
            background: var(--bg); text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; user-select: none;
        }
        .uploader-dropzone.dragover { border-color: var(--primary); background: rgba(76, 175, 80, 0.05); }
        .uploader-dropzone:hover { background: rgba(76, 175, 80, 0.05); }
        /* 👈 已移除原有的 .uploader-icon 图标样式 */
        .uploader-text { font-size: 13px; color: #888; }
        .uploader-filename { font-size: 12px; color: var(--primary); word-break: break-all; margin-top: 2px; font-weight: bold; }
        
        /* 👇 切换预览按钮：移至上传框右侧，外观尺寸与 📝 保持统一 */
        .uploader-preview-toggle {
            background: var(--panel-bg); border: 1px solid var(--border); color: #fff; border-radius: 8px;
            width: 2.5rem; cursor: pointer; font-size: 16px; display: none; align-items: center;
            justify-content: center; user-select: none;
        }
        .uploader-preview-toggle:hover { background-color: var(--border); }
        .uploader-preview-box {
            margin-top: 6px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg);
            overflow: hidden; display: flex; justify-content: center; align-items: center; max-height: 200px;
            transition: max-height 0.2s ease-out;
        }
        .uploader-preview-box.collapsed { max-height: 0; margin-top: 0; border: none; }
        .uploader-preview-box img, .uploader-preview-box video { max-width: 100%; max-height: 200px; object-fit: contain; }
        .uploader-preview-box audio { width: 100%; padding: 8px; }

        /* 底部操作栏 */
        .bottom-action-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; background-color: var(--bg); z-index: 100; display: flex;
            flex-direction: column; padding-bottom: env(safe-area-inset-bottom); border-top-left-radius: 24px; border-top-right-radius: 24px;
            box-shadow: 0px 0px 30px var(--shadow); border-top: 1px solid var(--border); 
        }
        
        .button-group { display: flex; gap: 10px; padding: 8px 16px 10px 16px; }
        /* 底部操作按钮基础样式与点击回弹 */
        .btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; height: 40px;
            font-weight: bold; color: white; cursor: pointer; display: flex; justify-content: center;
            align-items: center; transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
        }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        
        /* 👇 修改：开始生成按钮。采用蓝色（#3E8AE2），增加鼠标经过高光 */
        .btn-run-wrapper { position: relative; flex: 3; display: flex; }
        .btn-run { width: 100%; background-color: #3E8AE2; }
        .btn-run:hover { filter: brightness(1.2); }
        .queue-badge {
            display: none; position: absolute; top: -6px; left: -6px; font-size: 13px; font-weight: bold;
            background-color: #F44336 !important; color: #FFFFFF !important; height: 26px; min-width: 26px;
            padding: 0 5px; border-radius: 13px; border: 2px solid var(--bg); align-items: center; 
            justify-content: center; z-index: 10; pointer-events: none; 
        }
        
        /* 👇 修改：停止按钮。采用深红色（#A6433F），宽度为 60px 的紧凑正方形，增加鼠标经过高光 */
        .btn-stop { background-color: var(--red); flex: 1; font-size: 20px !important; }
        .btn-stop:hover { filter: brightness(1.2); }

        /* 模态浮层基类 */
        .modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; padding: 16px;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--panel-bg); border: 1px solid var(--border); border-radius: 12px;
            width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: bold; }
        .modal-close { color: #aaa; font-size: 24px; font-weight: bold; cursor: pointer; }
        .modal-close:hover { color: var(--text); }
        #multiline-textarea {
            width: 100%; height: 50vh; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); padding: 10px; font-family: inherit; font-size: 14px; resize: vertical;
        }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn { padding: 8px 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .modal-btn-cancel { background-color: var(--border); color: var(--text); }
        .modal-btn-save { background-color: var(--primary); color: #fff; }

        .lightbox-modal {
            display: none; position: fixed; z-index: 11000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center;
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
        }
        .lightbox-content { max-width: 95dvw; max-height: 90dvh; object-fit: contain; animation: zoom 0.15s ease-out; }
        @keyframes zoom { from {transform: scale(0.95); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        .lightbox-arrow {
            position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.55);
            border: none; color: #fff; font-size: 30px; width: 48px; height: 48px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 11200; transition: background 0.2s, transform 0.1s;
        }
        .lightbox-arrow:hover { background: var(--primary); }
        .lightbox-arrow:active { transform: translateY(-50%) scale(0.9); }
        .lightbox-arrow-left { left: 20px; padding-right: 3px; }
        .lightbox-arrow-right { right: 20px; padding-left: 3px; }
        
        .lightbox-close {
            top: 40px; right: 20px; font-size: 35px; font-weight: bold; padding-bottom: 6px;
            user-select: none; z-index: 11300 !important;
        }
        .lightbox-close:hover { background: #d13d22 !important; }
        
        .number-input::-webkit-outer-spin-button, .number-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .number-input[type=number] { -moz-appearance: textfield; }
        .btn-batch-input {
            background-color: var(--bg) !important; border: 2px solid var(--border) !important; border-radius: 8px !important;
            flex: 3rem 0 0; color: #fff; text-align: center; outline: none; touch-action: manipulation;
            padding-left: 4px !important; padding-right: 4px !important; height: 40px !important;
        }f
        
        .theme-toggle-btn {
            position: absolute; top: 10px; right: 10px; padding: 3px 10px; cursor: pointer;
            text-shadow: 0px 0px 1px var(--text) !important; transition: transform 0.2s ease;
        }
        .theme-toggle-btn:hover { transform: scale(1.1); }
        
        /* 👇【修改】：将终端展示区域完美适配到弹窗容器中，字体保持高对比度等宽 */
        .log-drawer-body {
            flex: 1; height: auto; width: 100%; background: #171717; color: #ccc; padding: 12px; 
            font-family: Consolas, Monaco, "Courier New", monospace; font-size: 12px; overflow-y: auto;
            -webkit-overflow-scrolling: touch; user-select: text !important; -webkit-user-select: text !important; 
        }
        
        /* 终端高亮配置不变 */
        .log-line { margin-bottom: 3px; word-break: break-all; }
        .log-time { color: #555; margin-right: 6px; }
        .log-tag { font-weight: bold; margin-right: 6px; }
        .log-line.white { color: #FFF; }
        .log-line.white .log-tag { color: #FFF; }
        .log-line.warning { color: #ffeb3b; }
        .log-line.warning .log-tag { color: #ffeb3b; }
        .log-line.green { color: var(--primary); }
        .log-line.green .log-tag { color: var(--primary); }
        .log-line.error { color: var(--red); }

        .btn-console { 
            background-color: #444; color: #fff; flex: 0 0 3rem; font-size: 16px !important;
            font-family: monospace; padding-top: 0px; padding-left: 0px;
        }
        .btn-console:hover { filter: brightness(1.2); }
        .btn-console.active { background-color: var(--primary); }
        
        /* 👇【新增】：主布局容器，继承原先 body 的响应式行为 */
        .main-layout { display: flex; flex-direction: column; flex: 1; width: 100%; overflow: hidden; }
        
        /* 👇【新增】：底部日志推起抽屉容器 */
        .log-drawer-container {
            display: flex; flex-direction: column; width: 100%; flex-shrink: 0; height: 0px; /* 默认隐藏 */
            transition: height 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); background-color: var(--panel-bg);
            z-index: 1000; overflow: hidden;
        }
        .log-drawer-container.dragging { transition: none; /* 拖拽时取消动画保证跟手 */ }
        
        .log-resizer {
            height: 18px; width: 100%; cursor: row-resize; background-color: #171717;
            flex-shrink: 0; display: flex; justify-content: center; align-items: center; border-top: 2px solid var(--border);
        }
        .log-resizer::after { content: ''; width: 100px; height: 4px; background: #AAAAAA; border-radius: 2px; }
        
        .header-bar {
            position: absolute;
            top: 8px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between; /* 按钮群在左，指示器在右 */
            align-items: center;
            z-index: 1000;
            gap: 10px; 
            pointer-events: none; /* 穿透未被按钮占用的空白区域 */
        }
        
        .header-btn-group {
            display: flex;
            flex-shrink: 0; 
            height: 30px;
            gap: 1.5px; /* 👈 每个按钮之间精确间隔 1px */
            background-color: var(--border); /* 用边框色作为背景，gap 处就会自然呈现 1px 分割线 */
            border: 1.5px solid var(--border);
            border-radius: 15px;
            overflow: hidden;
            pointer-events: auto; /* 恢复按钮区域的点击 */
            box-shadow: 0px 0px 30px var(--shadow);
        }
        
        .header-btn {
            background-color: var(--panel-bg);
            border: none;
            color: var(--title);
            height: 100%;
            padding: 0 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            cursor: pointer;
            white-space: nowrap; 
        }
        .header-btn:hover { background-color: var(--border); }
        
        /* 状态指示器 */
        .header-status-badge {
            background-color: var(--panel-bg);
            border: 1.5px solid var(--border);
            color: var(--title);
            height: 30px;
            padding: 0 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            /* 👈【核心新增】：自适应无损缩水技术 */
            flex-shrink: 1;          /* 允许空间不够时收缩 */
            min-width: 0;            /* 开启 Flex 缩水保护，打破容器默认最小内容宽度限制 */
            
            /* 👈【核心新增】：经典文本溢出 Ellipsis 省略号排版 */
            display: block;          /* 设为 block 确保 text-overflow 生效 */
            line-height: 28px;       /* 32px高度扣除上下边框各1px，30px行高可完美垂直居中 */
            text-align: center;
            white-space: nowrap;     /* 强行不换行 */
            overflow: hidden;        /* 隐藏超出边界的内容 */
            text-overflow: ellipsis; /* 超出部分自动渲染为优雅的 "..." */
            box-shadow: 0px 0px 30px var(--shadow);
        }
        
        /* 🎲 采用你设计的【Gap 缝隙透出法】三合一胶囊控制组 */
        .seed-utility-group {
            display: flex;
            align-items: center;
            background-color: var(--border); /* 👈 容器背景使用边框色 */
            border: 1px solid var(--border); /* 外边框 */
            border-radius: 8px;
            overflow: hidden; 
            flex-shrink: 0;
            height: 36px; 
            gap: 1px; /* 👈 每个按钮之间精确间隔 1px，透出底部的 var(--border) 作为分割线 */
        }
        
        /* 胶囊内的独立小按钮 */
        .btn-seed-util-item {
            width: 2.5rem; 
            height: 100%;
            /* 👈 核心微调：必须设为实心的 `--panel-bg`，以阻挡并盖住底部容器的边框色，仅让 gap 处透出线 */
            background-color: var(--panel-bg); 
            border: none; 
            color: var(--text);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .btn-seed-util-item:hover { background-color: var(--border); }
        
        /* 电脑端响应式重写 */
        @media (min-width: 768px) {
            /* 👈 核心修改：body 永远保持垂直排布，把横向排布交给 main-layout */
            .main-layout { flex-direction: row; }
            
            /* 100vh 改为 100%，以完美适应底部抽屉推起后的高度 */
            .viewer-container { flex: 1 1 auto; min-width: 0; height: 100%; }
            .right-panel {
                flex: 0 0 400px; width: 400px; min-width: 350px; max-width: calc(100vw - 350px) !important; 
                display: flex; flex-direction: column; height: 100%;
                position: relative; box-shadow: none; border-radius: 0px !important; border-top: 0px !important;
            }
            
            /* 横屏PC端画廊高度 */
            .gallery-container { flex: 0 0 100px !important; height: 100px !important; border-radius: 0px; padding-top: 0px; }
            .gallery-item { height: 80px !important; }
            .gallery-clear-btn { height: 40px !important; font-size: 14px; transform: translateX(6px); }
            .gallery-item-placeholder { width: 80px !important; height: 80px !important; }
            
            
            /* 之前修复的参数栏错位代码（保持绝对定位） */
            .resizer {
                position: absolute; left: 0; top: 0; 
                width: 14px; height: 100%; cursor: col-resize; flex-shrink: 0; border-top: none;
                border-bottom: none; border-left: 1px solid var(--border);
            }
            .resizer::after { width: 4px; height: 80px; left: 50%; top: calc(50% - 46px);}
            .resizer:hover, .resizer.dragging { background: var(--border); }
            .log-resizer {border-top: 1px solid var(--border);}
            
            .controls-section { flex: 1; padding-bottom: 80px; padding-left: 18px; }
            .bottom-action-bar { position: absolute; width: 100%; height: 100px; } 
            .button-group { display: flex; gap: 10px; padding-left: 0px; padding-top: 30px; }
            .bottom-action-bar, .gallery-container, .resizer { border-radius: 0px; box-shadow: none; }
        }
        
        /* 👇【全新新增】：悬浮启动页样式 */
        .splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100dvh;
            background-color: var(--bg); /* 自动同步深浅色背景，防止瞬间刺眼闪烁 */
            z-index: 999999; /* 确保处于绝对最顶层 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.3s;
            opacity: 1;
            visibility: visible;
        }
        
        /* 渐隐隐藏状态 */
        .splash-screen.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        .splash-content { text-align: center; animation: splashZoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .splash-icon { font-size: 64px; display: block; margin-bottom: 16px; }
        .splash-title {
            font-size: 24px; font-weight: bold; color: var(--text); letter-spacing: 1.5px;
            font-family: ui-rounded, "SF Pro Rounded", "Arial Rounded MT Bold", system-ui,sans-serif;
        }
        
        /* 缩放加微透入场动效 */
        @keyframes splashZoomIn {
            from {
                transform: scale(0.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .chrome-only #refresh-btn {
            font-size: 23px; font-weight: normal !important; padding-bottom: 3px; -webkit-text-stroke: 0px currentColor !important;
        }
    </style>
</head>
<body>
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <span class="splash-icon">🎛️</span>
            <div class="splash-title">ComfyUI AppBuilder</div>
        </div>
    </div>
    
    <!-- 顶端隐性进度条 -->
    <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    
    <!-- 👇 1. 【新增】：包裹主界面的全局布局容器 -->
    <div class="main-layout">
        <!-- 视图面板：包揽大图预览 -->
        <div class="viewer-container">
            <div class="preview-section">
                <div class="header-bar">
                    <div class="header-btn-group">

                        <button class="header-btn" id="refresh-btn" style="display: none; -webkit-text-stroke: 0.5px currentColor;" title="Refresh">↻</button>

                <img id="main-preview" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%'><rect width='100%' height='100%' fill='%23555'/><text x='50%' y='50%' fill='%23999' font-size='16' text-anchor='middle' alignment-baseline='middle'>No Media</text></svg>">
            </div>
            <!-- 结果历史画廊挂载点（外层：静止不滚动） -->
            <div class="gallery-container" id="gallery">
                <!-- 滚动图片区域（内层：专门负责滚动） -->

                        <button class="btn btn-run" id="btn-run" data-i18n="button_run">▷ Run</button>
                    </div>

                </div>

    </div> <!-- .main-layout 结束 -->
    
    <!-- 👇 3. 【新增】：底部的可伸缩日志抽屉 -->

        <!-- 横向高度调节拖拽条 -->
        <div id="log-resizer" class="log-resizer"></div>
        <div class="log-drawer-body" id="log-content">
            <div class="log-line system"></div>
        </div>
    </div>

    <!-- 文本编辑浮层 -->
    <div id="multiline-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-title" data-i18n="label_editer">Edit Text</span>
                <span class="modal-close" id="multiline-modal-close">&times;</span>
            </div>
            <textarea id="multiline-textarea"></textarea>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-cancel" id="multiline-btn-cancel" data-i18n="label_cancel">Cancel</button>
                <button class="modal-btn modal-btn-save" id="multiline-btn-save" data-i18n="label_save">Save</button>
            </div>

    <!-- 灯箱模式弹层 -->
    <div id="lightbox-modal" class="lightbox-modal">
        <span class="lightbox-arrow lightbox-close" id="lightbox-close">&times;</span>
        <button class="lightbox-arrow lightbox-arrow-left" id="lightbox-prev">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img">
        <button class="lightbox-arrow lightbox-arrow-right" id="lightbox-next">&#10095;</button>
    </div>

    <script>
        let translations = {};
        let sourceNodeId = null;
        let activeInputEl = null;
        
        // 灯箱数据
        let currentLightboxIndex = 0;
        let currentImagesList = [];
        
        let logHeight = localStorage.getItem('appview_log_height') || 250;
        let isLogOpen = false;
        
        // 👇【核心重构 1】：脚本刚运行，瞬间同步提取历史记录！绝不给任何消息覆盖的机会！
        let galleryData = [];
        try {
            const historyStr = localStorage.getItem('appview_gallery_history');
            if (historyStr) {
                galleryData = JSON.parse(historyStr);
                if (!Array.isArray(galleryData)) galleryData = [];
            }
        } catch(e) {
            galleryData = [];
        }
        
        // 📐【自包含完整版 - 物理容器隔离渲染】
        function renderGalleryItem(src, isPrepend) {
            // 👇【核心修改】：将目标容器指定为新加入的内层滚动区！
            const galleryScroll = document.getElementById('gallery-scroll');
            if (!galleryScroll) return;
            
            // 查重：如果 DOM 里已经有这张图（比如重新生成了同名图），先把它删掉防止重复
            //const existingItems = Array.from(document.querySelectorAll('.gallery-item, .gallery-item-placeholder'));
            //const duplicate = existingItems.find(el => el.src === src || (el.tagName === 'IMG' && el.src.endsWith(src)));
            //if (duplicate) duplicate.remove();
            
            const placeholder = document.createElement('div');
            placeholder.className = 'gallery-item-placeholder';
            
            // 🟢 因为清除按钮在滚动区外面，这里 append 变得异常简单，不需要再去判定 clearBtn 了
            if (isPrepend) {
                galleryScroll.insertBefore(placeholder, galleryScroll.firstChild);
            } else {
                galleryScroll.appendChild(placeholder); 
            }
            
            const testImg = new Image();
            testImg.onload = () => {
                const imgEl = document.createElement('img');
                imgEl.src = src;
                imgEl.className = 'gallery-item';
                imgEl.onclick = function() {
                    //document.getElementById('main-preview').src = this.src;
                    openLightbox(this.src);
                };
                placeholder.replaceWith(imgEl);
            };
            
            testImg.onerror = () => {
                placeholder.remove();
                galleryData = galleryData.filter(url => url !== src);
                localStorage.setItem('appview_gallery_history', JSON.stringify(galleryData));
            };
            
            testImg.src = src;
        }
        
        const savedTheme = localStorage.getItem('appview_theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.classList.add('light-theme');
        } else {
            document.documentElement.classList.remove('light-theme');
        }
        
        function isSafari() {
            const ua = navigator.userAgent;
            return /Safari/.test(ua) &&
            !/Chrome|CriOS|Edg|OPR|Firefox|FxiOS/.test(ua);
        }
        
        function t(key, defaultText, ...args) {
            let text = translations[key] || defaultText;
            if (args.length > 0) {
                args.forEach((arg, idx) => {
                    text = text.replace(`{${idx}}`, arg);
                });
            }
            return text;
        }
        
        async function loadI18n() {
            // 默认获取浏览器语言
            let locale = navigator.language.split(/[-_]/)[0];
            try {
                const parentWindow = window.parent !== window ? window.parent : (window.opener && !window.opener.closed ? window.opener : null);
                
                if (parentWindow && parentWindow.comfyApp && parentWindow.comfyApp.ui) {
                    locale = parentWindow.comfyApp.ui.settings.getSettingValue("Comfy.Locale") || "en";
                }
            } catch (e) { console.warn(e); }
            
            if (locale.startsWith("en")) return;
            
            try {
                const cacheBuster = `?t=${new Date().getTime()}`;
                const i18nUrl = new URL(`i18n/${locale}.json${cacheBuster}`, window.location.href).href;
                let res = await fetch(i18nUrl);
                if (!res.ok) {
                    const baseLang = locale.split('-')[0];
                    const baseI18nUrl = new URL(`i18n/${baseLang}.json`, window.location.href).href;
                    res = await fetch(baseI18nUrl);
                }
                if (res.ok) {
                    translations = await res.json();
                    applyStaticI18n(); 
                }
            } catch (e) {
                console.warn("Translation load skipped or failed:", e);
            }
        }
        
        function applyStaticI18n() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[key]) el.innerText = translations[key];
            });
        }
        
        function updateQueueBadge(count) {
            const badge = document.getElementById('queue-badge');
            if (!badge) return;

            const num = parseInt(count) || 0;
            if (num > 0) {
                badge.innerText = num;
                badge.style.display = 'flex'; // 👈 唤醒显示，填入数字并撑开内心
            } else {
                badge.style.display = 'none'; // 归零隐藏
            }
        }
        
        // 👇【终极升级】：引入增量自增 ID 追踪机制。刷新时自动拉回完整 400 行历史；正常运行时仅增量拉取新行，互不干扰
        let logPollInterval = null;
        window._lastLogId = 0; // 👈 核心：全局追踪本地当前接收到的最大日志 ID 标示
        
        function startLogPolling() {
            if (logPollInterval) return;
            
            logPollInterval = setInterval(async () => {
                try {
                    // 1. 发起增量拉取请求（传递本地最大 ID）
                    const res = await fetch(`/appbuilder/logs?after=${window._lastLogId}`);
                    if (res.ok) {
                        const logs = await res.json();
                        if (Array.isArray(logs) && logs.length > 0) {
                            logs.forEach(item => {
                                addRawTerminalLog(item.text); // 将清洗后的文本渲染
                            });
                            // 2. 核心：更新本地最大已接收日志 ID
                            window._lastLogId = logs[logs.length - 1].id;
                        }
                    }
                } catch (err) {
                    console.warn("Polling logs failed:", err);
                }
            }, 500); 
        }
        
        // 💻 必须在全局作用域声明此变量（放在脚本最上方），用于锁定并原位重写 KSampler 跑步进度
        let lastTerminalLineEl = null; 
        
        // 👇【最新升级】：专门针对模态层设计的真实 Python 终端镜像渲染器（带 tqdm 进度原位合并与 ANSI 降噪）
        function addRawTerminalLog(lineText) {
            const content = document.getElementById('log-content');
            if (!content) return;
            
            const time = new Date().toLocaleTimeString();
            
            // 1. 判定此行是否是 KSampler 等节点的 tqdm 进度条（含有百分比、步数或速度指示）
            const isProgress = lineText.includes('it/s') || lineText.includes('%|') || lineText.includes('s/it');
            
            // 2. 👈【核心清洗】：利用正则表达式彻底过滤掉 Python 终端自带的 \u001b[32m 等彩色 ANSI 转义字符乱码
            const cleanText = lineText.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '').trim();
            
            if (!cleanText) return;
            
            // 3. 👈【原位重写】：如果这一行是进度条，且上一行也是进度条，我们直接在上一行进行覆盖写入，绝不让进度条刷屏！
            if (isProgress && lastTerminalLineEl && lastTerminalLineEl.parentNode === content) {
                lastTerminalLineEl.innerHTML = cleanText;
            } else {
                const lineEl = document.createElement('div');
                
                // 根据控制台日志文本，自适应匹配高亮颜色
                let typeClass = 'white';
                if (cleanText.includes('[ERROR]') || cleanText.includes('Exception') || cleanText.includes('FAILED')) {
                    typeClass = 'error';
                } else if (cleanText.includes('[WARNING]')) {
                    typeClass = 'warning'
                } else if (cleanText.includes('Prompt executed') || cleanText.includes('executed in') || cleanText.includes('[INFO] Prompt executed')) {
                    typeClass = 'green';

        // 👇【核心修复】：状态机切换，彻底解决横竖屏转换时 inline 残留样式冲突的Bug
        function handleResponsiveLayout(isInit = false) {
            const isDesktop = window.innerWidth >= 768;
            const rightPanel = document.querySelector('.right-panel');
            const viewerContainer = document.querySelector('.viewer-container');
            if (!rightPanel || !viewerContainer) return;
            
            // 1. 画廊动态挪迁
            adjustGalleryLayout();
            
            // 2. 首次启动加载：直接从本地存储恢复对应设备的记忆数值，无需执行样式清理
            if (isInit) {
                if (isDesktop) {
                    const savedWidth = localStorage.getItem('appview_panel_width') || "400";
                    rightPanel.style.width = `${savedWidth}px`;
                    rightPanel.style.flexBasis = `${savedWidth}px`;
                } else {
                    const savedHeight = localStorage.getItem('appview_preview_height') || "30dvh";
                    viewerContainer.style.flex = `0 0 ${savedHeight}px`;
                }
                return;
            }
            
            // 3. 越界状态过渡：清除对方设备的 inline 残留，防止样式高权重锁死布局
            if (isDesktop && !isDesktopState) {
                // 📱 手机 -> 💻 电脑
                viewerContainer.style.flex = ""; // 彻底清除手机端残留的高度
                const savedWidth = localStorage.getItem('appview_panel_width') || "400";
                rightPanel.style.width = `${savedWidth}px`;
                rightPanel.style.flexBasis = `${savedWidth}px`; // 应用电脑端的宽
                
                isDesktopState = true;
            } else if (!isDesktop && isDesktopState) {
                // 💻 电脑 -> 📱 手机
                rightPanel.style.width = ""; // 彻底清除电脑端残留的宽度，允许手机端100%自适应
                rightPanel.style.flexBasis = ""; // 彻底清除 flex-basis
                const savedHeight = localStorage.getItem('appview_preview_height') || "30dvh";
                viewerContainer.style.flex = `0 0 ${savedHeight}px`; // 应用手机端的高
                
                isDesktopState = false;
            }
        }
        
        // 保留原有的 adjustGalleryLayout 不变，仅作为位置搬迁辅助
        function adjustGalleryLayout() {
            const isDesktop = window.innerWidth >= 768;
            const gallery = document.getElementById('gallery');
            if (!gallery) return;
            
            if (isDesktop) {
                const viewerContainer = document.querySelector('.viewer-container');
                if (viewerContainer && gallery.parentNode !== viewerContainer) {
                    viewerContainer.appendChild(gallery);
                }
            } else {
                const actionBar = document.querySelector('.bottom-action-bar');

                if (actionBar && buttonGroup && gallery.parentNode !== actionBar) {

        // 👇【核心修改】：改造为 SEED 专属定向同步（在生成完毕后，有且仅有种子参数才允许被反向回写，绝对不碰其他参数草稿）
        function syncParentValuesToAppView() {
            if (!window.comfyApp || !sourceNodeId) return;
            const node = window.comfyApp.graph.getNodeById(sourceNodeId);
            if (!node) return;
            
            for (const widget of node.widgets) {
                // 1. 判断当前是否为 SEED（种子）控件
                const isSeedWidget = !!document.getElementById(`input_action_${widget.name}`);
                
                if (isSeedWidget) {
                    const inputEl = document.getElementById(`input_${widget.name}`);
                    if (inputEl) {
                        // 仅同步并更新种子数值
                        inputEl.value = widget.value;
                        inputEl.dispatchEvent(new Event('change'));
                        inputEl.dispatchEvent(new Event('input'));
                    }
                    
                    // 2. 刷新其伴生的 control_after_generate 下拉菜单状态
                    if (widget.name === 'control_after_generate') {
                        const idx = node.widgets.indexOf(widget);
                        if (idx > 0) {
                            const seedWidget = node.widgets[idx - 1];
                            const modeBtn = document.getElementById(`input_action_btn_${seedWidget.name}`);
                            
                            // 👈【核心修改】：同步刷新循环模式切换键上的 Emoji 图标与 title 提示
                            if (modeBtn) {
                                const modeIcons = { "fixed": "⏺️", "increment": "⤴️", "decrement": "⤵️", "randomize": "🔀" };
                                modeBtn.innerText = modeIcons[widget.value] || "🔀";
                                modeBtn.title = `Seed Control: ${widget.value}`;
                            }
                        }
                    }
                }
            }
        }
        
        // 动态表单生成（支持 UPLOADER 媒体上传与折叠预览）
        async function renderDynamicForm(config) {
            const formContainer = document.getElementById('dynamic-form');
            formContainer.innerHTML = ''; 
            
            for (const [key, params] of Object.entries(config)) {
                const type = (params.type || "STRING").toUpperCase();
                if (type === "BUTTON") continue; 
                
                const group = document.createElement('div');
                group.className = 'control-group';
                
                const label = document.createElement('label');
                label.className = 'control-title';
                label.innerText = params.name || key;
                group.appendChild(label);
                
                // 获取主界面节点实时数值
                const parentNode = window.comfyApp ? window.comfyApp.graph.getNodeById(sourceNodeId) : null;
                const parentWidget = parentNode ? parentNode.widgets.find(w => w.name === key) : null;
                const currentValue = parentWidget ? parentWidget.value : params.default;
                    
                // 👇【核心修改】：支持普通数字框在 FLOAT 模式下高精度补齐末尾的 0（如 8 变 8.00），且支持加减与手动输入自适应
                if (type === "INT" || type === "FLOAT") {
                    const isSlider = params.slider === true || params.display === "slider";
                    
                    // 1. 提取精度：若配置中带有了 precision 则强行遵守；若无，FLOAT 默认 3 位，INT 保留 0 位
                    const precision = params.precision !== undefined ? Number(params.precision) : (type === "FLOAT" ? 3 : 0);
                    
                    if (isSlider) {
                        const formattedInitial = Number(currentValue ?? 0).toFixed(precision);
                        label.innerHTML = `<span>${params.name || key}</span><span class="slider-value-badge" id="badge_${key}">${formattedInitial}</span>`;
                        
                        const input = document.createElement('input');
                        input.type = 'range';
                        input.value = currentValue ?? 0;
                        if(params.min !== undefined) input.min = params.min;
                        if(params.max !== undefined) input.max = params.max;
                        
                        const step = params.step !== undefined ? Number(params.step) : (type === "INT" ? 1 : 0.1);
                        input.step = step;
                        input.id = `input_${key}`;
                        
                        input.addEventListener('input', () => {
                            const badge = document.getElementById(`badge_${key}`);
                            if (badge) {
                                badge.innerText = Number(input.value).toFixed(precision);
                            }
                        });
                        group.appendChild(input);
                    } else {
                        const wrapper = document.createElement('div');
                        wrapper.className = 'numeric-input-wrapper';
                        
                        const btnMinus = document.createElement('button');
                        btnMinus.type = 'button';
                        btnMinus.className = 'btn-numeric-adjust btn-numeric-adjust-left';
                        btnMinus.innerText = '◀';
                        
                        const input = document.createElement('input');
                        input.type = 'number';
                        input.className = 'number-input';
                        
                        // 2. 👈【初始化防抹零】：如果是 FLOAT，强制使用 toFixed 补齐末尾的 0（如 8 变 8.00）
                        input.value = type === "FLOAT" ? Number(currentValue ?? 0).toFixed(precision) : (currentValue ?? 0);
                        input.id = `input_${key}`;
                        if(params.min !== undefined) input.min = params.min;
                        if(params.max !== undefined) input.max = params.max;
                        
                        const step = params.step !== undefined ? Number(params.step) : (type === "INT" ? 1 : 0.1);
                        // 👈 核心：FLOAT 模式下设为 any，完美避开 Chrome/Safari 恶心的 step 步长不匹配检验警告弹窗
                        input.step = type === "FLOAT" ? "any" : step; 
                        
                        const btnPlus = document.createElement('button');
                        btnPlus.type = 'button';
                        btnPlus.className = 'btn-numeric-adjust btn-numeric-adjust-right';
                        btnPlus.innerText = '▶';
                        
                        const minVal = params.min !== undefined ? Number(params.min) : -Infinity;
                        const maxVal = params.max !== undefined ? Number(params.max) : Infinity;
                        
                        // 3. 👈【微调防抹零】：加减计算后，直接以 toFixed 字符串写回输入框，保障 0 不丢失
                        btnMinus.onclick = () => {
                            let val = Number(input.value) - step;
                            if (val < minVal) val = minVal;
                            input.value = type === "FLOAT" ? val.toFixed(precision) : Math.round(val);
                            input.dispatchEvent(new Event('change'));
                        };
                        
                        btnPlus.onclick = () => {
                            let val = Number(input.value) + step;
                            if (val > maxVal) val = maxVal;
                            input.value = type === "FLOAT" ? val.toFixed(precision) : Math.round(val);
                            input.dispatchEvent(new Event('change'));
                        };
                        
                        // 4. 👈【手动输入防抹零】：用户自己用键盘手动打字输入后，失焦（change）时同样自动重整补齐精度
                        input.addEventListener('change', () => {
                            let val = Number(input.value);
                            if (isNaN(val)) val = 0;
                            if (val < minVal) val = minVal;
                            if (val > maxVal) val = maxVal;
                            input.value = type === "FLOAT" ? val.toFixed(precision) : Math.round(val);
                        });
                        
                        wrapper.appendChild(btnMinus);
                        wrapper.appendChild(input);
                        wrapper.appendChild(btnPlus);
                        group.appendChild(wrapper);
                    }
                } else if (type === "BOOLEAN" || type === "BYPASSER") {
                    const toggleContainer = document.createElement('div');
                    toggleContainer.className = 'segmented-toggle';
                    
                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.id = `input_${key}`;
                    input.checked = currentValue ?? true;
                    input.style.display = 'none';
                    
                    const track = document.createElement('div');
                    track.className = 'toggle-track';
                    
                    const labelFalse = document.createElement('div');
                    labelFalse.className = 'toggle-label-half';
                    labelFalse.setAttribute('data-val', 'false');
                    labelFalse.innerText = (type === "BYPASSER") ? t('label_off', 'OFF') : t('label_false', 'False');
                    
                    const labelTrue = document.createElement('div');
                    labelTrue.className = 'toggle-label-half';
                    labelTrue.setAttribute('data-val', 'true');
                    labelTrue.innerText = (type === "BYPASSER") ? t('label_on', 'ON') : t('label_true', 'True');
                    
                    const thumb = document.createElement('div');
                    thumb.className = 'toggle-thumb';
                    
                    track.appendChild(labelFalse);
                    track.appendChild(labelTrue);
                    track.appendChild(thumb);
                    
                    toggleContainer.appendChild(input);
                    toggleContainer.appendChild(track);
                    
                    input.addEventListener('change', () => {
                        if (window.comfyApp && sourceNodeId) {
                            const node = window.comfyApp.graph.getNodeById(sourceNodeId);
                            if (node) {
                                const widget = node.widgets.find(w => w.name === key);
                                if (widget) {
                                    widget.value = input.checked;
                                    if (widget.callback) widget.callback(input.checked);
                                }
                            }
                        }
                    });
                    
                    // 点击切换
                    toggleContainer.addEventListener('click', () => {
                        input.checked = !input.checked;
                        input.dispatchEvent(new Event('change'));
                    });
                    
                    // 左右手势拖拽
                    let startX = 0;
                    toggleContainer.addEventListener('touchstart', (e) => {
                        startX = e.touches[0].clientX;
                    }, {passive: true});
                    toggleContainer.addEventListener('touchend', (e) => {
                        let endX = e.changedTouches[0].clientX;
                        let diffX = endX - startX;
                        if (Math.abs(diffX) > 40) {
                            if (diffX > 0 && !input.checked) {
                                input.checked = true;
                                input.dispatchEvent(new Event('change'));
                            } else if (diffX < 0 && input.checked) {
                                input.checked = false;
                                input.dispatchEvent(new Event('change'));
                            }
                        }
                    }, {passive: true});
                    
                    group.appendChild(toggleContainer);
                } else if (type === "COMBO") {
                    const select = document.createElement('select');
                    select.id = `input_${key}`;
                    let values = params.values || ["None"];
                    if (params.folder) {
                        try {
                            const response = await fetch(`/appbuilder/ls/${params.folder}`);
                            if (response.ok) {
                                const data = await response.json();
                                values = ["None", ...data];
                            }

                    }
                    values.forEach(val => {
                        const opt = document.createElement('option');
                        opt.value = val;
                        opt.innerText = val;
                        select.appendChild(opt);
                    });
                    select.value = currentValue ?? params.default;
                        group.appendChild(select);
                } else if (type === "UPLOADER") {
                    const uploaderContainer = document.createElement('div');
                    uploaderContainer.className = 'uploader-wrapper';
                    
                    // 存储文件名的隐藏 Input，用来与 ComfyUI 进行后台通信同步
                    const valueInput = document.createElement('input');
                    valueInput.type = 'hidden';
                    valueInput.id = `input_${key}`;
                    valueInput.value = currentValue || '';
                    uploaderContainer.appendChild(valueInput);
                    
                    const controlRow = document.createElement('div');
                    controlRow.className = 'uploader-control-row';
                    
                    // 拖拽盒子（移除了 📤 图标标签）
                    const dropzone = document.createElement('div');

                    const text = document.createElement('span');
                    text.className = 'uploader-text';

                    text.innerText = t("label_uploader", "Drop {0} here or click to browse",t(mediaType, mediaType));
                    
                    const filenameLabel = document.createElement('div');
                    filenameLabel.className = 'uploader-filename';

                    dropzone.appendChild(text);
                    dropzone.appendChild(filenameLabel);
                    
                    // 原生隐藏的文件选择控件 (放置在 dropzone 外部，杜绝点击事件无限死循环调用)
                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.style.display = 'none';
                    if (mediaType === 'image') fileInput.accept = 'image/*';
                    else if (mediaType === 'video') fileInput.accept = 'video/*';
                    else if (mediaType === 'audio') fileInput.accept = 'audio/*';
                    else fileInput.accept = 'image/*,video/*,audio/*';
                    
                    // 预览切换按钮（移至右侧，改用 👁️ 进行简洁显示）
                    const previewToggle = document.createElement('button');
                    previewToggle.type = 'button';

                    // 依次将组件塞入行容器中

                    uploaderContainer.appendChild(fileInput);

                    // 预览盒子
                    const previewBox = document.createElement('div');
                    previewBox.className = 'uploader-preview-box collapsed';
                    
                    uploaderContainer.appendChild(previewBox);
                    
                    // 触发文件选择
                    dropzone.onclick = () => {
                        fileInput.click();
                    };
                    
                    // 处理拖放与选择事件
                    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
                    dropzone.ondragenter = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
                    dropzone.ondragleave = () => { dropzone.classList.remove('dragover'); };
                    dropzone.ondrop = (e) => {
                        e.preventDefault();
                        dropzone.classList.remove('dragover');
                        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                            handleFileUpload(e.dataTransfer.files[0]);
                        }
                    };
                    
                    fileInput.onchange = () => {
                        if (fileInput.files && fileInput.files.length > 0) {
                            handleFileUpload(fileInput.files[0]);
                        }
                    };
                    
                    // 监听文件值的变动，一旦发生改变（上传成功或重新加载），实时更新主节点
                    valueInput.addEventListener('change', () => {
                        if (window.comfyApp && sourceNodeId) {
                            const node = window.comfyApp.graph.getNodeById(sourceNodeId);
                            if (node) {
                                const widget = node.widgets.find(w => w.name === key);
                                if (widget) {
                                    widget.value = valueInput.value;
                                    if (widget.callback) widget.callback(valueInput.value);
                                }
                            }
                        }
                    });
                    
                    // 异步上传逻辑
                    // 异步上传逻辑（已升级客户端格式过滤防护网）
                    async function handleFileUpload(file) {
                        // 👇【核心修改：客户端多媒体类型强制双重验证（MIME + 后缀名）】
                        const mime = file.type || "";
                        const ext = file.name.split('.').pop().toLowerCase();
                        
                        // 👇【严格按照 ComfyUI 官方及主流媒体节点支持的格式构建的白名单】
                        const imageExts = ['png', 'jpg', 'jpeg', 'webp', 'bmp', 'tif', 'tiff', 'jfif', 'jpe', 'tga'];
                        const videoExts = ['mp4', 'webm', 'mkv', 'mov', 'avi', 'gif', 'flv', '3gp'];
                        const audioExts = ['wav', 'mp3', 'ogg', 'flac', 'm4a', 'aac', 'wma'];
                        
                        // 双重校验：支持 mime 类型检测和物理后缀白名单检测
                        const isImage = mime.startsWith('image/') || imageExts.includes(ext);
                        const isVideo = mime.startsWith('video/') || videoExts.includes(ext);
                        const isAudio = mime.startsWith('audio/') || audioExts.includes(ext);
                        
                        // 匹配当前控件要求的 mediaType
                        let isValid = false;
                        if (mediaType === 'image') {
                            isValid = isImage;
                        } else if (mediaType === 'video') {
                            isValid = isVideo;
                        } else if (mediaType === 'audio') {
                            isValid = isAudio;
                        } else {
                            // 若没配置或设为 all，默认支持上述三大类多媒体
                            isValid = isImage || isVideo || isAudio;
                        }
                        
                        // 拦截验证失败的文件
                        if (!isValid) {
                            //alert(`Upload Blocked!\nThis uploader is configured for [${mediaType.toUpperCase()}] files only.\n\nSelected file: ${file.name}`);
                            text.innerText = t("label_uploader", "Drop {0} here or click to browse",t(mediaType, mediaType));
                            return;
                        }
                        
                        // 通过验证后开始执行上传动作
                        text.innerText = t('label_uploading', 'Uploading...');
                        const formData = new FormData();
                        formData.append('image', file);
                        
                        try {
                            const response = await fetch('/upload/image', {
                                method: 'POST',
                                body: formData
                            });
                            if (response.ok) {
                                const result = await response.json();
                                valueInput.value = result.name;
                                filenameLabel.innerText = result.name;
                                text.innerText = t("label_uploader", "Drop {0} here or click to browse",t(mediaType, mediaType));
                                
                                valueInput.dispatchEvent(new Event('change'));
                                
                                updateMediaPreview(result.name);
                            } else {
                                text.innerText = t('label_upfailed', 'Upload failed!');
                            }
                        } catch (err) {
                            console.error(err);
                            text.innerText = t('label_upfailed', 'Upload failed!');
                        }
                    }
                    
                    // 自适应媒体类型预览组件渲染
                    function updateMediaPreview(filename) {
                        previewBox.innerHTML = '';
                        previewToggle.style.display = 'flex';
                        
                        if (!filename || filename === 'None' || filename === 'undefined' || filename === '') {
                            const placeholderImg = document.createElement('img');
                            // 采用主预览同款黑底灰字无损 SVG
                            placeholderImg.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%'><rect width='100%' height='100%' fill='%23555'/><text x='50%' y='50%' fill='%23999' font-size='16' text-anchor='middle' alignment-baseline='middle'>No Media</text></svg>";
                            previewBox.appendChild(placeholderImg);
                            
                            // 占位符状态下我们保持其折叠状态（collapsed）以节省屏幕空间，用户可以手动点击小眼睛展开查看
                            return;
                        }
                        
                        // 如果是真实的媒体资源，自动移除折叠状态进行展开
                        previewBox.classList.remove('collapsed');
                        
                        const fileUrl = `/view?filename=${encodeURIComponent(filename)}&type=input`;
                        let mediaElement;
                        
                        if (mediaType === 'image') {
                            mediaElement = document.createElement('img');
                            mediaElement.src = fileUrl;
                        } else if (mediaType === 'video') {
                            mediaElement = document.createElement('video');
                            mediaElement.src = fileUrl;
                            mediaElement.controls = true;
                        } else if (mediaType === 'audio') {
                            mediaElement = document.createElement('audio');
                            mediaElement.src = fileUrl;
                            mediaElement.controls = true;
                        } else {
                            // 无法识别时：根据文件后缀猜测类型
                            const ext = filename.split('.').pop().toLowerCase();
                            if (['mp4', 'webm', 'ogg', 'mov'].includes(ext)) {
                                mediaElement = document.createElement('video');
                                mediaElement.src = fileUrl;
                                mediaElement.controls = true;
                            } else if (['mp3', 'wav', 'ogg', 'm4a'].includes(ext)) {
                                mediaElement = document.createElement('audio');
                                mediaElement.src = fileUrl;
                                mediaElement.controls = true;
                            } else {
                                mediaElement = document.createElement('img');
                                mediaElement.src = fileUrl;
                            }
                        }
                        
                        previewBox.appendChild(mediaElement);
                    }
                    
                    previewToggle.onclick = () => {
                        previewBox.classList.toggle('collapsed');
                    };
                    
                    updateMediaPreview(currentValue || 'None');
                    group.appendChild(uploaderContainer);
                } else if (type === "SEED") {
                    const seedContainer = document.createElement('div');
                    seedContainer.className = 'numeric-input-wrapper'; // 👈 直接使用数字行的全宽弹性包裹器
                    
                    const btnMinus = document.createElement('button');
                    btnMinus.type = 'button';
                    btnMinus.className = 'btn-numeric-adjust btn-numeric-adjust-left';
                    btnMinus.innerText = '◀';
                    //btnMinus.style.width = '2.5rem';
                    
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.className = 'number-input';
                    //input.style.fontSize = '0.9rem';
                    input.value = currentValue ?? 0;
                    input.id = `input_${key}`;
                    input.min = 0;
                    input.max = "18446744073709551615"; 
                    
                    const btnPlus = document.createElement('button');
                    btnPlus.type = 'button';
                    btnPlus.className = 'btn-numeric-adjust btn-numeric-adjust-right';
                    btnPlus.innerText = '▶';
                    //btnPlus.style.width = '2.5rem';
                    
                    btnMinus.onclick = () => {
                        let val = BigInt(input.value) - 1n;
                        if (val < 0n) val = 0n;
                        input.value = val.toString();
                        input.dispatchEvent(new Event('change'));
                    };
                    
                    btnPlus.onclick = () => {
                        let val = BigInt(input.value) + 1n;
                        const maxVal = 18446744073709551615n;
                        if (val > maxVal) val = maxVal;
                        input.value = val.toString();
                        input.dispatchEvent(new Event('change'));
                    };
                    
                    const utilGroup = document.createElement('div');
                    utilGroup.className = 'seed-utility-group';
                    const gap = document.createElement('div');
                    gap.style.width = '6px';
                    
                    // 自动计算提取 ComfyUI 在 SEED 控件后配置的 control_after_generate 伴生控件
                    const seedWidgetIndex = parentNode ? parentNode.widgets.indexOf(parentWidget) : -1;
                    const companionWidget = (seedWidgetIndex !== -1) ? parentNode.widgets[seedWidgetIndex + 1] : null;
                    
                    // 4种生成后动作的文本值与 Emoji 图标的对齐字典
                    const modeActions = ["fixed", "increment", "decrement", "randomize"];
                    const modeIcons = {
                        "fixed": "⏺️",
                        "increment": "⤴️",
                        "decrement": "⤵️",
                        "randomize": "🔀"
                    };
                    
                    // 1. 👈【新增】：循环模式切换按钮，替代原本的下拉框
                    const btnMode = document.createElement('button');
                    btnMode.type = 'button';
                    btnMode.className = 'btn-seed-util-item';
                    btnMode.id = `input_action_btn_${key}`;
                    
                    const initMode = companionWidget ? (companionWidget.value || "randomize") : "randomize";
                    btnMode.innerText = modeIcons[initMode] || "🔀";
                    btnMode.title = t("random_mode", "Seed Control: ") + t(`label_${initMode}`, initMode);
                    // 点击时进行 4 种动作的轮转切换并同步画布
                    btnMode.onclick = () => {
                        let currentIdx = modeActions.indexOf(companionWidget ? companionWidget.value : "randomize");
                        if (currentIdx === -1) currentIdx = 3;
                        
                        const nextIdx = (currentIdx + 1) % modeActions.length;
                        const nextMode = modeActions[nextIdx];
                        
                        btnMode.innerText = modeIcons[nextMode];
                        btnMode.title = t("random_mode", "Seed Control: ") + t(`label_${nextMode}`, nextMode);
                        
                        if (companionWidget) {
                            companionWidget.value = nextMode;
                            if (companionWidget.callback) companionWidget.callback(nextMode);
                        }
                    };
                    
                    // 2. 找回上一个种子 (♻️)
                    const btnReuse = document.createElement('button');
                    btnReuse.type = 'button';
                    btnReuse.className = 'btn-seed-util-item';
                    btnReuse.innerText = '♻️';
                    btnReuse.title = t("lastSeed_desc", 'Reuse Last Seed');
                    btnReuse.onclick = (e) => {
                        e.stopPropagation();
                        const lastVal = window._lastSeeds ? window._lastSeeds[key] : null;
                        if (lastVal) {
                            input.value = lastVal;
                            input.dispatchEvent(new Event('change'));
                            
                            // 自动切换并锁定为固定状态（fixed / ⏺️）
                            btnMode.innerText = "⏺️";

                            if (companionWidget) {
                                companionWidget.value = "fixed";
                                if (companionWidget.callback) companionWidget.callback("fixed");
                            }
                        }

                    // 3. 随机大整数种子 (🎲)
                    const btnRand = document.createElement('button');
                    btnRand.type = 'button';
                    btnRand.className = 'btn-seed-util-item';
                    btnRand.innerText = '🎲';
                    btnRand.title = t("randomSeed_desc", 'Randomize Seed');
                    btnRand.onclick = (e) => {
                        e.stopPropagation();
                        const randVal = Math.floor(Math.random() * 1125899906842624).toString();
                        input.value = randVal;
                        input.dispatchEvent(new Event('change'));
                        
                        // 自动切换并锁定为固定状态（fixed / ⏺️）
                        btnMode.innerText = "⏺️";
                        btnMode.title = t("random_mode", "Seed Control: ") + t(`label_fixed`, "fixed");

                    seedContainer.appendChild(input);
                    seedContainer.appendChild(btnPlus);

                    group.appendChild(seedContainer);
                } else {
                    const isMultiline = params.multiline === true;
                    
                    if (isMultiline) {
                        const container = document.createElement('div');
                        container.className = 'input-with-button';
                    
                        const input = document.createElement('textarea');
                        input.className = 'tight-textarea';
                        input.style.height = '72px';
                        input.value = currentValue ?? '';
                        input.id = `input_${key}`;
                        input.rows = 1;
                        input.placeholder = params.placeholder || "";
                        container.appendChild(input);
                    
                        const editBtn = document.createElement('button');
                        editBtn.className = 'btn-edit-multiline';
                        editBtn.type = 'button';
                        editBtn.innerText = '📝';
                        editBtn.onclick = () => openMultilineEditor(input, params.name || key);
                        container.appendChild(editBtn);
                    
                        group.appendChild(container);
                    } else {
                        // 2. 如果未开启多行文本：退回最干净的普通单行输入框，完全不渲染 📝 按钮
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.value = currentValue ?? '';
                        input.id = `input_${key}`;
                        
                        if (params.placeholder) input.placeholder = params.placeholder;
                        group.appendChild(input);
                    }

                formContainer.appendChild(group);
